// ===== LocalStorage helpers =====
function saveProgress() {
  try { localStorage.setItem('fp_progress', JSON.stringify({ si: selectedStoreIdx, ai: selectedAssetIdx, form: form, sigs: sigs })); } catch(e) {}
}
function loadProgress() {
  try { var d = JSON.parse(localStorage.getItem('fp_progress')); if (d) { selectedStoreIdx = d.si; selectedAssetIdx = d.ai; form = d.form || {}; sigs = d.sigs || { store: null, tech: null }; return true; } } catch(e) {}

// ===== Auth =====
async function initAuth() {
  var { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadAssets();
    await loadCompletedPMs();
    await checkUserRole();
    screen = 'home';
  } else {
    screen = 'login';
  }
  render();

  sb.auth.onAuthStateChange(async function(event, session) {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await loadAssets();
      await loadCompletedPMs();
      await checkUserRole();
      screen = 'home';
      render();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      ASSETS = [];
      completedPMs = [];
      userRole = null;
      screen = 'login';
      render();
    }
  });
}

  if (error) { showStatus('Failed to load assets: ' + error.message, 'err'); return; }

}

async function loadCompletedPMs() {
  var { data, error } = await sb.from('completed_pms').select('*').order('created_at', { ascending: false });
  if (!error && data) { completedPMs = data; }
}

async function loadTechProfiles() {
  var { data } = await sb.from('tech_profiles').select('*').order('role').order('email');
  techProfiles = data || [];
}

async function loadTechRoute(email) {
  var { data } = await sb.from('route_assignments').select('*').eq('tech_email', email).eq('active', true).order('stop_order');
  if (!data || data.length === 0) { adminTechAssets = []; return; }
  adminTechAssets = data.map(function(r) { return r.asset_id; });
}

async function loadAllAssignments() {
  var { data } = await sb.from('route_assignments').select('tech_email,asset_id').eq('active', true);
  allAssignments = data || [];
}

async function loadPayouts() {
  var { data } = await sb.from('payouts').select('*').order('week_start', { ascending: false });
  payouts = data || [];
}

async function loadMyRoute() {
  if (!currentUser) return;
  var { data } = await sb.from('route_assignments').select('*').eq('tech_email', currentUser.email).eq('active', true).order('stop_order');
  if (!data) { myRoute = []; return; }
  // Join with asset data
  myRoute = data.map(function(ra) {
    var asset = ASSETS.find(function(a) { return a.id === ra.asset_id; });
    return asset ? Object.assign({}, ra, { asset: asset }) : null;
  }).filter(Boolean);
}

// ===== Helpers =====
function isCompleted(serial) {
  return completedPMs.some(function(pm) { return pm.serial === serial; });
}
function getCompletedDate(serial) {
  var pm = completedPMs.find(function(p) { return p.serial === serial; });
  return pm ? pm.pm_date : null;
}

function showStatus(msg, type) {
  statusMsg = msg;
  statusType = type || 'ok';
  render();
  setTimeout(function() { statusMsg = ''; render(); }, 4000);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function lbl(t) { return '<label style="font-size:13px;color:var(--dim);margin-bottom:2px">' + t + '</label>'; }
function inp(name, type, ph) { return '<input type="' + (type||'text') + '" name="' + name + '" placeholder="' + (ph||'') + '" value="' + esc(form[name]||'') + '">'; }
function fld(t, name, type, ph) { return lbl(t) + inp(name, type, ph); }
function chk(name, t) { return '<label><input type="checkbox" name="' + name + '"' + (form[name] ? ' checked' : '') + '> ' + t + '</label>'; }

// ===== Signature Pads =====
function sigPad(key, title) {
  return lbl(title) +
    '<canvas class="sig-canvas" id="sig_' + key + '"></canvas>' +
    '<div class="sig-bar">' +
      '<span class="hint">' + (sigs[key] ? '✓ Signed' : 'Sign above with finger or stylus') + '</span>' +
      '<button type="button" onclick="clearSig(\'' + key + '\')">Clear</button>' +
    '</div>';
}

function initSigPad(key) {
  var c = document.getElementById('sig_' + key);
  if (!c) return;
  c.width = c.offsetWidth || 400;
  c.height = 120;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (sigs[key]) {
    var im = new Image();
    im.onload = function() { ctx.drawImage(im, 0, 0, c.width, c.height); };
    im.src = sigs[key];
  }
  var drawing = false;
  function pos(e) { var r = c.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
  c.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    drawing = true;
    try { c.setPointerCapture(e.pointerId); } catch(err) {}
    var p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p[0], p[1]);
    ctx.lineTo(p[0] + 0.1, p[1] + 0.1);
    ctx.stroke();
  });
  c.addEventListener('pointermove', function(e) {
    if (!drawing) return;
    e.preventDefault();
    var p = pos(e);
    ctx.lineTo(p[0], p[1]);
    ctx.stroke();
  });
  function end() {
    if (!drawing) return;
    drawing = false;
    sigs[key] = c.toDataURL('image/png');
    saveProgress();
    var hint = c.nextElementSibling && c.nextElementSibling.querySelector('.hint');
    if (hint) hint.textContent = '✓ Signed';
  }
  c.addEventListener('pointerup', end);
  c.addEventListener('pointercancel', end);
  c.addEventListener('pointerleave', end);
}

function clearSig(key) {
  sigs[key] = null;
  saveProgress();
  var c = document.getElementById('sig_' + key);
  if (c) {
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, c.width, c.height);
    var hint = c.nextElementSibling && c.nextElementSibling.querySelector('.hint');
    if (hint) hint.textContent = 'Sign above with finger or stylus';
  }
}

// ===== Route Optimization (Nearest-Neighbor) =====
function haversine(lat1, lng1, lat2, lng2) {
  var R = 3959; // miles
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function optimizeRoute(assetIds) {
  // Group assets by unique location (lat/lng)
  var stops = [];
  var seenAddr = {};
  assetIds.forEach(function(id) {
    var a = ASSETS.find(function(x) { return x.id === id; });
    if (!a) return;
    var key = (a.address || '') + '|' + (a.city || '');
    if (!seenAddr[key]) {
      seenAddr[key] = { lat: a.lat, lng: a.lng, ids: [id], addr: key };
      stops.push(seenAddr[key]);
    } else {
      seenAddr[key].ids.push(id);
    }
  });
  if (stops.length <= 1) {
    var flat = [];
    stops.forEach(function(s, i) { s.ids.forEach(function(id) { flat.push({ id: id, order: i }); }); });
    return flat;
  }
  // Nearest-neighbor from first stop
  var ordered = [stops[0]];
  var remaining = stops.slice(1);
  while (remaining.length > 0) {
    var last = ordered[ordered.length - 1];
    var nearIdx = 0, nearDist = Infinity;
    for (var i = 0; i < remaining.length; i++) {
      var d = haversine(last.lat, last.lng, remaining[i].lat, remaining[i].lng);
      if (d < nearDist) { nearDist = d; nearIdx = i; }
    }
    ordered.push(remaining[nearIdx]);
    remaining.splice(nearIdx, 1);
  }
  var flat = [];
  ordered.forEach(function(s, i) { s.ids.forEach(function(id) { flat.push({ id: id, order: i }); }); });
  return flat;
}

// ===== Navigation =====
function openNavigation(address, city, state, zip) {
  var addr = encodeURIComponent(address + ', ' + city + ', ' + state + ' ' + zip);
  // Detect iOS
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    window.open('maps://maps.apple.com/?daddr=' + addr, '_blank');
  } else {
    window.open('https://www.google.com/maps/dir/?api=1&destination=' + addr, '_blank');
  }
}

// ===== Photo Handling =====
function compressImg(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      var max = 1000;
      var w = img.width, h = img.height;
      if (w > max || h > max) { var r = Math.min(max/w, max/h); w *= r; h *= r; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.5));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function takePhoto() {
  var i = document.createElement('input');
  i.type = 'file'; i.accept = 'image/*'; i.capture = 'environment';
  i.onchange = function() { handlePhotos(i); };
  i.click();
}

function uploadPhoto() {
  var i = document.createElement('input');
  i.type = 'file'; i.accept = 'image/*'; i.multiple = true;
  i.onchange = function() { handlePhotos(i); };
  i.click();
}

function handlePhotos(input) {
  var files = input.files;
  for (var j = 0; j < files.length; j++) {
    (function(f) {
      compressImg(f, function(d) { photos.push(d); render(); });
    })(files[j]);
  }
}

function removePhoto(i) {
  photos.splice(i, 1);
  render();
}

// ===== Render Router =====
function render() {
  var el = document.getElementById('app');
  var html = '';
  if (statusMsg) {
    html += '<div class="status ' + statusType + '">' + esc(statusMsg) + '</div>';
  }
  if (screen === 'loading') { html += renderLoading(); }
  else if (screen === 'login') { html += renderLogin(); }
  else if (screen === 'home') { html += renderHome(); }
  else if (screen === 'select') { html += renderSelect(); }
  else if (screen === 'checklist') { html += renderChecklist(); }
  else if (screen === 'history') { html += renderHistory(); }
  else if (screen === 'pay') { html += renderPay(); }
  else if (screen === 'admin') { html += renderAdmin(); }
  else if (screen === 'route') { html += renderRoute(); }
  else if (screen === 'routeStop') { html += renderRouteStop(); }
  el.innerHTML = html;
  bindEvents();
}

  return '<div class="login-wrap"><div class="logo">🐾</div><h1>Freshpet PM</h1><p class="sub"><span class="spinner"></span> Loading...</p></div>';

function renderLogin() {
  return '<div class="login-wrap">' +
    '<div class="logo">🐾</div>' +
    '<h1>Freshpet PM</h1>' +

// ===== Weekly Pay (tech) =====
function fmtD(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function payWeekRange() {
  var ws = new Date();
  ws.setHours(0, 0, 0, 0);
  ws.setDate(ws.getDate() - ((ws.getDay() + 6) % 7) + payWeekOffset * 7); // Monday
  var we = new Date(ws);
  we.setDate(we.getDate() + 6); // Sunday
  return { start: fmtD(ws), end: fmtD(we) };
}
function fee$(n) { return '$' + Number(n || 0).toFixed(2); }

// Stores this tech completed in the given week, with per-store fees
function myWeekStores(range) {
  var mine = completedPMs.filter(function(pm) {
    return pm.tech_user_id === currentUser.id && pm.pm_date >= range.start && pm.pm_date <= range.end;
  });
  var stores = {}, order = [];
  mine.forEach(function(pm) {
    var a = ASSETS.find(function(x) { return x.id === pm.asset_id; });
    var key = pm.store + '|' + (a ? a.address : '');
    if (!stores[key]) {
      stores[key] = { store: pm.store, address: a ? a.address : '', city: a ? a.city : '', fee: 0, pms: 0 };
      order.push(key);
    }
    stores[key].pms++;
    if (a && Number(a.pm_fee || 0) > stores[key].fee) { stores[key].fee = Number(a.pm_fee); }
  });
  return order.map(function(k) { return stores[k]; });
}

  await loadPayouts();

}

function renderPay() {
  var range = payWeekRange();

    '<button class="btn btn-o" style="width:auto;padding:8px 14px" onclick="payWeekOffset--;render()">←</button>' +

    '<button class="btn btn-o" style="width:auto;padding:8px 14px;opacity:' + (payWeekOffset >= 0 ? '.3' : '1') + '" onclick="if(payWeekOffset<0){payWeekOffset++;render()}">→</button>' +
  '</div>';
  h += '<div style="font-size:32px;font-weight:700;margin-top:10px">' + fee$(total) + '</div>';
  h += '<div style="color:var(--dim);font-size:13px">' + list.length + ' store' + (list.length === 1 ? '' : 's') + ' completed</div>';
  h += '</div>';

  list.forEach(function(s) {
    h += '<div class="hist-item" style="display:flex;justify-content:space-between;align-items:center">' +
      '<span><strong>' + esc(s.store) + '</strong><br><span style="color:var(--dim);font-size:11px">' + esc(s.city) + ' &bull; ' + s.pms + ' PM' + (s.pms === 1 ? '' : 's') + '</span></span>' +
      '<span style="font-weight:700;color:var(--gn)">' + fee$(s.fee) + '</span>' +
    '</div>';
  });
  if (!list.length) {
    h += '<p style="text-align:center;color:var(--dim);padding:20px 0">No completed stores this week</p>';
  }

  if (existing) {
    h += '<div class="card" style="text-align:center;border-color:var(--gn)">' +
      (existing.status === 'paid' ? '✅ Payout PAID — ' : '📨 Payout submitted — ') +
      fee$(existing.amount) + ' for ' + existing.store_count + ' store' + (existing.store_count === 1 ? '' : 's') +
    '</div>';
  } else if (list.length > 0) {
    h += submittingPayout
      ? '<div class="card" style="text-align:center"><span class="spinner"></span> Submitting...</div>'
      : '<button class="btn btn-s" style="margin-top:10px" onclick="submitPayout()">📨 Submit Weekly Payout (' + fee$(total) + ')</button>';
  }
  return h;
}

async function submitPayout() {
  if (submittingPayout) return;
  var range = payWeekRange();
  var list = myWeekStores(range);
  if (!list.length) return;
  var total = list.reduce(function(s, x) { return s + x.fee; }, 0);
  if (!confirm('Submit payout of ' + fee$(total) + ' for ' + list.length + ' store(s), week ' + range.start + ' – ' + range.end + '?')) return;

  submittingPayout = true;
  render();
  var { error } = await sb.from('payouts').insert({
    tech_email: currentUser.email,
    week_start: range.start,
    week_end: range.end,
    store_count: list.length,
    amount: total,
    details: list
  });
  submittingPayout = false;
  if (error) {
    if (error.code === '23505') { showStatus('Payout already submitted for this week', 'err'); }
    else { showStatus('Error: ' + error.message, 'err'); }
  } else {
    showStatus('Payout submitted!', 'ok');
  }
  await loadPayouts();
  render();
}

// ===== Share PDF (email/text to Freshpet) =====
async function sharePDF(path) {
  var url = SUPA_URL + '/storage/v1/object/public/fp-pdfs/' + path;
  try {
    if (navigator.share) {
      var resp = await fetch(url);
      var blob = await resp.blob();
      var file = new File([blob], path.split('/').pop(), { type: 'application/pdf' });
      if (!navigator.canShare || navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Freshpet PM Report' });
        return;
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') return; // user closed the share sheet
  }
  window.open(url, '_blank');
}

async function saveStoreFee(i, store, address) {
  var el = document.getElementById('fee_' + i);
  var f = parseFloat(el && el.value);
  if (isNaN(f) || f < 0) { showStatus('Enter a valid fee', 'err'); return; }
  var { error } = await sb.from('assets').update({ pm_fee: f }).eq('store', store).eq('address', address);
  if (error) { showStatus('Error: ' + error.message, 'err'); return; }
  ASSETS.forEach(function(a) { if (a.store === store && a.address === address) a.pm_fee = f; });
  showStatus(store + ' fee set to ' + fee$(f), 'ok');
}

async function setAllFees() {
  var el = document.getElementById('bulkFee');
  var f = parseFloat(el && el.value);
  if (isNaN(f) || f < 0) { showStatus('Enter a valid fee', 'err'); return; }
  if (!confirm('Set the PM fee for ALL stores to ' + fee$(f) + '?')) return;

async function shareSelectedReports() {
  if (sharingReports) return;
  var list = getReportList().filter(function(pm) { return reportSel[pm.id]; });
  if (!list.length) return;
  sharingReports = true;
  render();

  try {
    var files = [];
    for (var i = 0; i < list.length; i++) {
      var url = SUPA_URL + '/storage/v1/object/public/fp-pdfs/' + list[i].pdf_path;
      var resp = await fetch(url);
      if (!resp.ok) { throw new Error('Could not fetch PDF for ' + list[i].store + ' (' + list[i].pm_date + ')'); }
      var blob = await resp.blob();
      files.push(new File([blob], list[i].pdf_path.split('/').pop(), { type: 'application/pdf' }));
    }
    sharingReports = false;

    if (navigator.share && (!navigator.canShare || navigator.canShare({ files: files }))) {
      await navigator.share({ files: files, title: 'Freshpet PM Reports' });
      showStatus(files.length + ' PDF' + (files.length === 1 ? '' : 's') + ' sent', 'ok');
    } else {
      // No share sheet (desktop browsers): download each file instead
      files.forEach(function(f, idx) {
        setTimeout(function() {
          var a = document.createElement('a');
          a.href = URL.createObjectURL(f);
          a.download = f.name;
          a.click();
          setTimeout(function() { URL.revokeObjectURL(a.href); }, 10000);
        }, idx * 300);
      });
      showStatus('Share sheet not available — downloading ' + files.length + ' PDF' + (files.length === 1 ? '' : 's'), 'info');
    }
    render();
  } catch (err) {
    sharingReports = false;
    if (err.name === 'AbortError') { render(); return; } // user closed the share sheet
    showStatus('Error: ' + err.message, 'err');
    render();
  }
}

function parseCSV(text) {
  var rows = [], row = [], cur = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else { inQ = false; } }
      else { cur += c; }
    }
    else if (c === '"') { inQ = true; }
    else if (c === ',') { row.push(cur); cur = ''; }
    else if (c === '\n') { row.push(cur); cur = ''; if (row.some(function(x){ return x.trim() !== ''; })) rows.push(row); row = []; }
    else if (c !== '\r') { cur += c; }
  }
  row.push(cur);
  if (row.some(function(x){ return x.trim() !== ''; })) rows.push(row);
  return rows;
}

// Maps Freshpet export headers (and simple ones) to asset fields
var CSV_COLMAP = {
  store: ['account name', 'store', 'store name'],
  address: ['shipping address line 1', 'address', 'shipping street'],
  city: ['city'],
  state: ['shipping state/province', 'state', 'state/province'],
  zip: ['shipping zip/postal code', 'zip', 'zip/postal code', 'zip code', 'postal code'],
  phone: ['phone'],
  manufacturer: ['manufacturer'],
  model: ['model'],
  serial: ['asset: serial number', 'serial number', 'serial'],
  warranty: ['warranty']
};

function mapCSVHeader(headerRow) {
  var idx = {};
  headerRow.forEach(function(cell, i) {
    var n = cell.trim().toLowerCase().replace(/^location:\s*/, '');
    for (var field in CSV_COLMAP) {
      if (idx[field] === undefined && CSV_COLMAP[field].indexOf(n) > -1) { idx[field] = i; }
    }
  });
  return idx;
}

function handleCSVFile(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  importFileName = file.name;
  var reader = new FileReader();
  reader.onload = function(e) { buildImportPreview(e.target.result); };
  reader.readAsText(file);
}

async function buildImportPreview(text) {
  var raw = parseCSV(text);
  if (raw.length < 2) { showStatus('CSV file appears to be empty', 'err'); return; }

  var idx = mapCSVHeader(raw[0]);
  var required = ['store', 'address', 'city', 'zip', 'serial'];
  var missing = required.filter(function(f) { return idx[f] === undefined; });
  if (missing.length) {
    showStatus('CSV is missing columns: ' + missing.join(', '), 'err');
    return;
  }

  var rows = [], skipped = [], seen = {};
  for (var i = 1; i < raw.length; i++) {
    var r = raw[i];
    var get = function(f) { return idx[f] !== undefined && r[idx[f]] !== undefined ? r[idx[f]].trim() : ''; };
    var rec = {
      store: get('store'), address: get('address'), city: get('city'),
      state: get('state') || 'CA', zip: get('zip'), phone: get('phone'),
      manufacturer: get('manufacturer'), model: get('model'),
      serial: get('serial'), warranty: get('warranty')
    };
    // Some Freshpet exports have a second section where City is inserted
    // before State, shifting city->state, state->zip, zip->city, and phone
    // ends up one column to the right.
    if (!/^\d{5}/.test(rec.zip) && /^[A-Z]{2}$/i.test(rec.zip) && /^\d{5}/.test(rec.city)) {
      var shifted = { city: rec.state, state: rec.zip, zip: rec.city };
      if (idx.phone !== undefined && r[idx.phone + 1] !== undefined && /^USA$/i.test(rec.phone)) {
        shifted.phone = r[idx.phone + 1].trim();
      }
      rec.city = shifted.city; rec.state = shifted.state; rec.zip = shifted.zip;
      if (shifted.phone) rec.phone = shifted.phone;
    }
    // Skip repeated header rows, broken serials, and rows without a usable zip
    if (/serial/i.test(rec.serial) || /header/i.test(rec.serial)) { continue; }
    if (!rec.serial || rec.serial === '#REF!' || /^:?-+:?$/.test(rec.serial)) {
      skipped.push('Row ' + (i + 1) + ': missing/invalid serial (' + (rec.store || '?') + ' ' + rec.model + ')');
      continue;
    }
    if (!/^\d{5}/.test(rec.zip)) {
      skipped.push('Row ' + (i + 1) + ': invalid zip "' + rec.zip + '" (' + rec.store + ', S/N ' + rec.serial + ')');
      continue;
    }
    var key = rec.serial.toUpperCase();
    if (seen[key]) { skipped.push('Row ' + (i + 1) + ': duplicate serial ' + rec.serial + ' (' + rec.store + ')'); continue; }
    seen[key] = true;
    rec.zip = rec.zip.substring(0, 5);
    rows.push(rec);
  }

  if (rows.length === 0) { showStatus('No valid asset rows found in file', 'err'); return; }

  // Compare against ALL assets in DB (including deactivated ones)
  var { data: existing, error } = await sb.from('assets').select('id,serial,zip,lat,lng,active');
  if (error) { showStatus('Failed to read current assets: ' + error.message, 'err'); return; }
  var bySerial = {};
  (existing || []).forEach(function(a) { bySerial[(a.serial || '').toUpperCase()] = a; });

  var newCount = 0, updateCount = 0;
  rows.forEach(function(rec) {
    if (bySerial[rec.serial.toUpperCase()]) { updateCount++; } else { newCount++; }
  });
  var fileSerials = {};
  rows.forEach(function(rec) { fileSerials[rec.serial.toUpperCase()] = true; });
  var deactivateSerials = (existing || []).filter(function(a) {
    return a.active && !fileSerials[(a.serial || '').toUpperCase()];
  }).map(function(a) { return a.serial; });

  importPreview = { rows: rows, newCount: newCount, updateCount: updateCount, deactivateSerials: deactivateSerials, skipped: skipped, existingBySerial: bySerial };
  render();
}

async function geocodeZip(zip, cache) {
  if (cache[zip] !== undefined) return cache[zip];
  try {
    var resp = await fetch('https://api.zippopotam.us/us/' + zip);
    if (resp.ok) {
      var d = await resp.json();
      var p = d.places && d.places[0];
      cache[zip] = p ? { lat: parseFloat(p.latitude), lng: parseFloat(p.longitude) } : null;
    } else { cache[zip] = null; }
  } catch (e) { cache[zip] = null; }
  return cache[zip];
}

async function runImport() {
  if (!importPreview || importing) return;
  importing = true;
  render();

  try {
    var p = importPreview;
    var bySerial = p.existingBySerial;

    // lat/lng: keep existing coordinates; for new assets reuse coordinates of
    // another asset in the same zip, otherwise geocode the zip
    var zipLL = {};
    for (var s in bySerial) {
      var a = bySerial[s];
      if (a.lat != null && zipLL[a.zip] === undefined) { zipLL[a.zip] = { lat: a.lat, lng: a.lng }; }
    }
    var geoCache = {};
    var upserts = [];
    for (var i = 0; i < p.rows.length; i++) {
      var rec = p.rows[i];
      var existing = bySerial[rec.serial.toUpperCase()];
      var ll = existing && existing.lat != null ? { lat: existing.lat, lng: existing.lng }
        : (zipLL[rec.zip] || await geocodeZip(rec.zip, geoCache));
      upserts.push({
        store: rec.store, address: rec.address, city: rec.city, state: rec.state,
        zip: rec.zip, phone: rec.phone, manufacturer: rec.manufacturer, model: rec.model,
        serial: existing ? existing.serial : rec.serial, warranty: rec.warranty,
        active: true, lat: ll ? ll.lat : null, lng: ll ? ll.lng : null,
        updated_at: new Date().toISOString()
      });
    }

    for (var j = 0; j < upserts.length; j += 100) {
      var { error: upErr } = await sb.from('assets').upsert(upserts.slice(j, j + 100), { onConflict: 'serial' });
      if (upErr) { throw new Error('Import failed at row ' + (j + 1) + ': ' + upErr.message); }
    }

    var deactivated = 0;
    if (importFullReplace && p.deactivateSerials.length) {
      for (var k = 0; k < p.deactivateSerials.length; k += 100) {
        var chunk = p.deactivateSerials.slice(k, k + 100);
        var { error: deErr } = await sb.from('assets').update({ active: false, updated_at: new Date().toISOString() }).in('serial', chunk);
        if (deErr) { throw new Error('Deactivation failed: ' + deErr.message); }
        deactivated += chunk.length;
      }
    }

    await loadAssets();
    importing = false;
    var msg = 'Import complete: ' + p.newCount + ' added, ' + p.updateCount + ' updated';
    if (deactivated) { msg += ', ' + deactivated + ' removed'; }
    importPreview = null;
    showStatus(msg, 'ok');
  } catch (err) {
    importing = false;
    showStatus('Error: ' + err.message, 'err');
    render();
  }
}

function renderRoute() {
  var h = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">' +

  '</div>';

  if (myRoute.length === 0) {
    h += '<div class="card" style="text-align:center;padding:40px 16px">' +
      '<p style="font-size:16px;margin-bottom:8px">No route assigned yet</p>' +
      '<p style="color:var(--dim);font-size:13px">Ask your admin to assign stops to your route.</p>' +
    '</div>';
    return h;
  }

  // Group by stop_order to form stops
  var stops = [];
  var seenOrder = {};
  myRoute.forEach(function(r) {
    var key = r.stop_order;
    if (!seenOrder[key]) {
      seenOrder[key] = { order: r.stop_order, assets: [r.asset], address: r.asset.address, city: r.asset.city, state: r.asset.state, zip: r.asset.zip, store: r.asset.store };
      stops.push(seenOrder[key]);
    } else {
      seenOrder[key].assets.push(r.asset);
    }
  });

  // Sort by order
  stops.sort(function(a, b) { return a.order - b.order; });

  // Determine completion status of each stop
  var today = new Date().toISOString().split('T')[0];
  stops.forEach(function(s) {
    s.allDone = s.assets.every(function(a) { return isCompleted(a.serial); });
    s.someDone = s.assets.some(function(a) { return isCompleted(a.serial); });
  });

  var doneCount = stops.filter(function(s) { return s.allDone; }).length;

  h += '<div class="card" style="text-align:center">' +
    '<div style="font-size:24px;font-weight:700">' + doneCount + '/' + stops.length + '</div>' +
    '<div style="color:var(--dim);font-size:13px">Stops Completed</div>' +
    '<div class="progress-bar"><div class="fill" style="width:' + (stops.length > 0 ? (doneCount / stops.length * 100) : 0) + '%"></div></div>' +
  '</div>';

  // Start/End day: re-optimize remaining stops from wherever you are
  if (doneCount < stops.length) {
    if (startingDay) {
      h += '<div class="card" style="text-align:center"><span class="spinner"></span> Finding your location &amp; reordering route...</div>';
    } else if (localStorage.getItem('fp_day_on')) {
      h += '<button class="btn btn-o" style="margin-bottom:10px;border-color:var(--rd);color:var(--rd)" onclick="endDay()">🛑 End Day</button>';
    } else {
      h += '<button class="btn btn-s" style="margin-bottom:10px" onclick="startDay()">▶️ Start Day (route from my location)</button>';
    }
  }

  stops.forEach(function(s, i) {
    var isCurrent = !s.allDone && (i === 0 || stops[i-1].allDone);
    var cls = s.allDone ? 'completed' : (isCurrent ? 'current' : '');
    var numCls = s.allDone ? 'done' : (isCurrent ? 'current' : 'pending');

    h += '<div class="stop-card ' + cls + '">';
    h += '<div style="display:flex;align-items:flex-start;gap:4px">';
    h += '<span class="stop-num ' + numCls + '">' + (s.allDone ? '✓' : (i+1)) + '</span>';
    h += '<div style="flex:1">';
    h += '<strong>' + esc(s.store) + '</strong>';
    if (isCurrent) { h += ' <span class="badge">Current</span>'; }
    h += '<br><span style="font-size:12px;color:var(--dim)">' + esc(s.address) + ', ' + esc(s.city) + '</span>';
    h += '<br><span style="font-size:12px;color:var(--dim)">' + s.assets.length + ' asset(s)';
    var doneSoFar = s.assets.filter(function(a) { return isCompleted(a.serial); }).length;
    if (doneSoFar > 0 && !s.allDone) { h += ' &bull; ' + doneSoFar + ' done'; }
    h += '</span>';

// ===== Start / End Day =====
var startingDay = false;

function endDay() {
  localStorage.removeItem('fp_day_on');
  showStatus('Day ended — hit Start Day to pick back up', 'info');
  render();
}

function getPosition() {
  return new Promise(function(resolve) {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      function(pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      function() { resolve(null); },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  });
}

async function startDay() {
  if (startingDay) return;
  startingDay = true;
  render();

  try {
    var origin = await getPosition();
    var stops = getRouteStops();
    var doneStops = stops.filter(function(s) { return s.assets.every(function(a) { return isCompleted(a.serial); }); });
    var todo = stops.filter(function(s) { return !s.assets.every(function(a) { return isCompleted(a.serial); }); });

    if (!origin) {
      // No GPS: start from the last completed stop, or keep current order
      var last = doneStops[doneStops.length - 1];
      if (last && last.assets[0]) { origin = { lat: last.assets[0].lat, lng: last.assets[0].lng }; }
    }

    if (origin && todo.length > 1) {
      // Nearest-neighbor over the remaining stops from the origin
      var ordered = [];
      var remaining = todo.slice();
      var cur = origin;
      while (remaining.length > 0) {
        var nearIdx = 0, nearDist = Infinity;
        for (var i = 0; i < remaining.length; i++) {
          var a0 = remaining[i].assets[0];
          var d = haversine(cur.lat, cur.lng, a0.lat, a0.lng);
          if (d < nearDist) { nearDist = d; nearIdx = i; }
        }
        ordered.push(remaining[nearIdx]);
        cur = { lat: remaining[nearIdx].assets[0].lat, lng: remaining[nearIdx].assets[0].lng };
        remaining.splice(nearIdx, 1);
      }
      todo = ordered;
    }

    // Persist new order: completed stops first, then re-optimized remainder
    var seq = doneStops.concat(todo);
    for (var s = 0; s < seq.length; s++) {
      var ids = [];
      myRoute.forEach(function(r) { if (r.stop_order === seq[s].order) ids.push(r.id); });
      if (ids.length) {
        var { error } = await sb.from('route_assignments').update({ stop_order: s }).in('id', ids);
        if (error) { throw new Error(error.message); }
      }
    }

    localStorage.setItem('fp_day_on', '1');
    await loadMyRoute();
    startingDay = false;
    showStatus(origin ? 'Day started — route reordered from your location' : 'Day started (location unavailable — order unchanged)', 'ok');
    render();
  } catch (err) {
    startingDay = false;
    showStatus('Error reordering route: ' + err.message, 'err');
    render();
  }
}

function getRouteStops() {
  var stops = [];
  var seenOrder = {};
  myRoute.forEach(function(r) {
    var key = r.stop_order;
    if (!seenOrder[key]) {
      seenOrder[key] = { order: r.stop_order, assets: [r.asset], address: r.asset.address, city: r.asset.city, state: r.asset.state, zip: r.asset.zip, store: r.asset.store };
      stops.push(seenOrder[key]);
    } else {
      seenOrder[key].assets.push(r.asset);
    }
  });
  stops.sort(function(a, b) { return a.order - b.order; });
  return stops;
}

async function submitForm() {
  if (submitting) return;
  if (!form.techName) { showStatus('Please enter tech name', 'err'); return; }
  if (!sigs.store || !sigs.tech) {
    var missingSigs = [];
    if (!sigs.store) missingSigs.push('store manager');
    if (!sigs.tech) missingSigs.push('technician');
    if (!confirm('Missing ' + missingSigs.join(' and ') + ' signature. Submit anyway?')) return;
  }

  submitting = true;
  render();

  try {
    localStorage.setItem('fp_techName', form.techName);
    localStorage.setItem('fp_company', form.serviceCompany || '');

    var a = selectedAsset;
    var timestamp = Date.now();
    var safeStore = a.store.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
    var baseName = safeStore + '_' + a.serial + '_' + (form.date || '').replace(/-/g, '');

    var photoPaths = [];
    for (var i = 0; i < photos.length; i++) {
      var photoBlob = dataURLtoBlob(photos[i]);
      var photoPath = baseName + '_photo_' + (i + 1) + '_' + timestamp + '.jpg';
      var { data: pData, error: pErr } = await sb.storage.from('fp-photos').upload(photoPath, photoBlob, {
        contentType: 'image/jpeg',
        upsert: false
      });
      if (pErr) { console.warn('Photo upload error:', pErr); }
      else { photoPaths.push(photoPath); }
    }

    var pdfDoc = await new Promise(function(resolve) {
      generatePDF(a, form, photos, sigs, function(doc) { resolve(doc); });
    });

    var pdfBlob = pdfDoc.output('blob');
    var pdfPath = baseName + '_' + timestamp + '.pdf';
    var { error: pdfErr } = await sb.storage.from('fp-pdfs').upload(pdfPath, pdfBlob, {
      contentType: 'application/pdf',
      upsert: false
    });
    if (pdfErr) { console.warn('PDF upload error:', pdfErr); }

    var { error: dbErr } = await sb.from('completed_pms').insert({
      asset_id: a.id,
      tech_user_id: currentUser.id,
      tech_name: form.techName,
      service_company: form.serviceCompany || '',
      pm_date: form.date || new Date().toISOString().split('T')[0],
      form_data: form,
      pdf_path: pdfPath,
      photo_paths: photoPaths,
      store: a.store,
      serial: a.serial
    });

    if (dbErr) { throw new Error('DB save failed: ' + dbErr.message); }

    // Save a local copy so the report can be sent to Freshpet right away
    try { pdfDoc.save(baseName + '.pdf'); } catch(e) {}

    await loadCompletedPMs();
    clearProgress();
    submitting = false;

    // If came from route, go back to route stop
    if (routeFromChecklist) {
      routeFromChecklist = false;
      screen = 'routeStop';
      showStatus('PM submitted!', 'ok');
    } else {
      screen = 'home';
      showStatus('PM submitted successfully!', 'ok');
    }

  } catch (err) {
    submitting = false;
    showStatus('Error: ' + err.message, 'err');
    render();
  }
}

function dataURLtoBlob(dataURL) {
  var parts = dataURL.split(',');
  var mime = parts[0].match(/:(.*?);/)[1];
  var b64 = atob(parts[1]);
  var arr = new Uint8Array(b64.length);
  for (var i = 0; i < b64.length; i++) arr[i] = b64.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function renderAdminAssetPicker() {

  h += '<div class="search"><input type="text" id="searchInput" placeholder="Search store, city, address..." value="' + esc(search) + '"></div>';

  // Group by store location
  var groups = {};
  var groupOrder = [];
  var filtered = ASSETS.filter(function(a) {
    if (!search) return true;
    var s = search.toLowerCase();
    return a.store.toLowerCase().indexOf(s) > -1 ||
           a.city.toLowerCase().indexOf(s) > -1 ||
           a.address.toLowerCase().indexOf(s) > -1;
  });

  // Who has each asset (one tech per store: taken stores can't be added)
  var assignedTo = {};
  allAssignments.forEach(function(ra) { assignedTo[ra.asset_id] = ra.tech_email; });

  filtered.forEach(function(a) {
    var key = a.store + '|' + a.address + '|' + a.city;
    if (!groups[key]) {
      groups[key] = { store: a.store, address: a.address, city: a.city, assets: [], allAssigned: true, takenBy: null };
      groupOrder.push(key);
    }
    var owner = assignedTo[a.id];
    if (owner && owner !== adminSelectedTech) { groups[key].takenBy = owner; }
    var assigned = adminTechAssets.indexOf(a.id) > -1;
    if (!assigned) groups[key].allAssigned = false;
    groups[key].assets.push({ asset: a, assigned: assigned });
  });

  groupOrder.forEach(function(key) {
    var g = groups[key];
    h += '<div class="store-grp">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<h4>📍 ' + esc(g.store) + ' — ' + esc(g.city) + '</h4>';
    if (g.takenBy) {
      var owner = techProfiles.find(function(t) { return t.email === g.takenBy; });
      h += '<span style="color:var(--or);font-size:12px">🔒 ' + esc(owner ? (owner.name || owner.email) : g.takenBy) + '</span>';
    } else if (!g.allAssigned) {
      var ids = g.assets.filter(function(x) { return !x.assigned; }).map(function(x) { return x.asset.id; });
      h += '<button class="btn btn-p" style="width:auto;padding:6px 12px;font-size:12px" onclick="addStoreToRoute([' + ids.join(',') + '])">+ Add All</button>';
    } else {
      h += '<span style="color:var(--gn);font-size:12px">✓ Assigned</span>';
    }
    h += '</div>';
    h += '<div style="font-size:12px;color:var(--dim);margin-bottom:4px;padding:0 4px">' + esc(g.address) + ' &bull; ' + g.assets.length + ' asset(s)</div>';
    h += '</div>';
  });

  return h;
}

async function addStoreToRoute(assetIds) {
  // Add assets that aren't already assigned
  var toAdd = assetIds.filter(function(id) { return adminTechAssets.indexOf(id) === -1; });
  if (toAdd.length === 0) { showStatus('Already assigned', 'info'); return; }

  var maxOrder = adminTechAssets.length > 0 ? adminTechAssets.length : 0;
  var inserts = toAdd.map(function(id, i) {
    return {
      tech_email: adminSelectedTech,
      asset_id: id,
      stop_order: maxOrder + i,
      route_name: 'Primary Route',
      active: true
    };
  });

  var { error } = await sb.from('route_assignments').insert(inserts);
  if (error) {
    if (error.code === '23505') {
      showStatus('Store is already assigned to another tech', 'err');
      await loadAllAssignments();
    } else {
      showStatus('Error: ' + error.message, 'err');
    }
    render();
    return;
  }

  adminTechAssets = adminTechAssets.concat(toAdd);
  await loadAllAssignments();
  showStatus(toAdd.length + ' asset(s) added to route', 'ok');
  render();
}

// ===== Event Binding =====
function bindEvents() {
  var si = document.getElementById('searchInput');
  if (si) {
    si.addEventListener('input', function() { search = this.value; render(); });
    si.focus();
    si.setSelectionRange(si.value.length, si.value.length);
  }
  var fsi = document.getElementById('feeSearchInput');
  if (fsi) {
    fsi.addEventListener('input', function() { feeSearch = this.value; render(); var el = document.getElementById('feeSearchInput'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } });
  }

  document.querySelectorAll('.asset-btn').forEach(function(btn) {
    if (btn.getAttribute('data-idx') !== null) {
      btn.addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        startChecklist(idx);
      });
    }
  });

  if (screen === 'checklist') {
    initSigPad('store');
    initSigPad('tech');
    document.querySelectorAll('input[name],textarea[name],select[name]').forEach(function(el) {
      var handler = function() {
        if (el.type === 'checkbox') {
          form[el.name] = el.checked;
          if (el.name === 'otherLoc') {
            var w = document.getElementById('otherLocWrap');
            if (w) w.style.display = el.checked ? 'block' : 'none';
          }
        } else {
          form[el.name] = el.value;
        }
        saveProgress();
      };
      el.addEventListener('change', handler);
      if (el.type !== 'checkbox') el.addEventListener('input', handler);
    });
  }
}

// Override render to include admin asset picker
var _origRender = render;
render = function() {
  var el = document.getElementById('app');
  var html = '';
  if (statusMsg) {
    html += '<div class="status ' + statusType + '">' + esc(statusMsg) + '</div>';
  }
  if (screen === 'adminAssetPicker') {
    html += renderAdminAssetPicker();
    el.innerHTML = html;
    bindEvents();
    return;
  }
  // Call original screens
  if (screen === 'loading') { html += renderLoading(); }
  else if (screen === 'login') { html += renderLogin(); }
  else if (screen === 'home') { html += renderHome(); }
  else if (screen === 'select') { html += renderSelect(); }
  else if (screen === 'checklist') { html += renderChecklist(); }
  else if (screen === 'history') { html += renderHistory(); }
  else if (screen === 'pay') { html += renderPay(); }
  else if (screen === 'admin') { html += renderAdmin(); }
  else if (screen === 'route') { html += renderRoute(); }
  else if (screen === 'routeStop') { html += renderRouteStop(); }
  el.innerHTML = html;
  bindEvents();
};

// ===== Init =====
initAuth();
