<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF8F0">
<title>Freshpet · Admin Console</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Excel (.xls/.xlsx) parsing for the asset uploads. -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- Pre-paint: follow the shared APBG theme (same origin as the gateway). -->
<script>
  (function(){ try { var t = localStorage.getItem('apbg_theme')==='light'?'light':'dark'; document.documentElement.setAttribute('data-apbg-theme', t); } catch(e){} })();
</script>
<!-- APBG cross-app waffle launcher + shared light/dark toggle. -->
<script src="https://alamedapointbg.com/appswitcher.js" defer></script>
<style>
/* Freshpet color system — light only. Warm cream canvas, Freshpet orange
   primary, fresh green for success. Intentionally does NOT follow the shared
   APBG dark toggle: nothing keys off [data-apbg-theme], so the site stays
   light regardless of the gateway theme switch. */
:root{
  --bg:#FFF8F0; --sf:#FFFFFF; --sf2:#F6EEE3; --bd:#EEE0CF; --bd2:#DCC8AC;
  --line:rgba(42,37,33,.07);
  --tx:#2A2521; --tx2:#786B5E; --dim:#8A7A66;
  --ac:#E56A15; --ac2:#C85A0E; --gn:#2FA24C; --am:#CF8A17; --rd:#DB4A44;
  --shadow:0 1px 2px rgba(42,37,33,.04),0 4px 16px rgba(191,120,58,.08);
  --font:'Helvetica Neue',Helvetica,Arial,'Segoe UI',Roboto,system-ui,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.5;letter-spacing:-.006em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* Inline SVG icons (Lucide-style) — inherit color + font-size, replace emoji */
.ic-svg{width:1.05em;height:1.05em;vertical-align:-.16em;flex:none;stroke-width:2}
.logo .ic-svg{width:1.15em;height:1.15em;vertical-align:-.18em;color:var(--ac)}
.tab .ic-svg,.seg button .ic-svg{margin-right:5px}
/* Accessibility: visible keyboard focus + honor reduced-motion */
:focus-visible{outline:2px solid var(--ac);outline-offset:2px;border-radius:8px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
@media (max-width:680px){.btn.sm{min-height:40px}.ic{width:40px;height:40px}}
a{color:var(--ac);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:18px 22px 60px}
/* Header */
.hd{display:flex;align-items:center;gap:14px;padding:16px 0 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.hd .logo{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}
.hd .logo .fp{color:var(--ac)}
.hd .sub{font-size:.66rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.hd .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.who{font-size:.78rem;color:var(--tx2);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-size:.84rem;font-weight:600;background:var(--ac);color:#fff;transition:filter .15s,background .15s,border-color .15s}
.btn:hover{filter:brightness(1.06)}
.btn.o{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.btn.o:hover{border-color:var(--bd2);background:var(--sf2)}
.btn.sm{padding:6px 11px;font-size:.78rem;border-radius:8px}
.btn.gn{background:var(--gn)}.btn.rd{background:var(--rd)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Tabs — clean underline nav (shared look with the portal) */
.tabs{display:flex;gap:2px;margin:18px 0 22px;flex-wrap:wrap;border-bottom:1px solid var(--bd)}
.tab{padding:10px 15px;font-size:.88rem;font-weight:500;color:var(--tx2);background:transparent;border:0;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.tab:hover{color:var(--tx)}
/* Cards / layout */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
.card h3{font-size:1.02rem;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
.card .hint{font-size:.8rem;color:var(--tx2);margin-bottom:16px;line-height:1.55;max-width:74ch}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
label.f{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin:0 0 5px}
select,input[type=text],input[type=number],input[type=search]{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);font-size:.88rem;outline:none}
select:focus,input:focus{border-color:var(--ac)}
.muted{color:var(--tx2);font-size:.82rem}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--bd)}
.pill.gn{color:var(--gn);border-color:var(--gn);background:rgba(47,162,76,.12)}
.pill.am{color:var(--am);border-color:var(--am);background:rgba(207,138,23,.13)}
.pill.dim{color:var(--tx2)}
/* Route list */
.stop{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--bd);border-radius:12px;background:var(--bg);margin-bottom:8px}
.stop .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem}
.stop .meta{flex:1;min-width:0}
.stop .meta .s{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .meta .a{font-size:.76rem;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .acts{display:flex;gap:4px;flex:none}
.ic{width:30px;height:30px;border-radius:8px;background:var(--sf2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.ic:hover{border-color:var(--bd2)}
.ic:disabled{opacity:.35}
.addrow{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;background:var(--bg)}
.addrow .meta{flex:1;min-width:0}
.addlist{max-height:340px;overflow-y:auto;margin-top:8px;padding-right:4px}
.grp-h{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin:12px 0 6px}
/* Table — airy rows, light rules, hover highlight */
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-size:.87rem}
th{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--sf2)}
tbody tr:last-child td{border-bottom:0}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono)}
tr.tot td{border-top:2px solid var(--bd);font-weight:700;border-bottom:none}
.empty{padding:34px 16px;text-align:center;color:var(--tx2);font-size:.9rem}
/* Overview tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.tile{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:14px 16px}
.tile .lb{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2)}
.tile .v{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums}
.tile .v.gn{color:var(--gn)}.tile .v.am{color:var(--am)}.tile .v.ac{color:var(--ac)}
.tile .sub{font-size:.72rem;color:var(--tx2);margin-top:3px}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.seg button{padding:7px 13px;font-size:.8rem;font-weight:700;color:var(--tx2);background:transparent}
.seg button.on{background:var(--ac);color:#fff}
.bar{height:7px;border-radius:999px;background:var(--sf2);overflow:hidden;min-width:70px}
.bar>i{display:block;height:100%;background:var(--gn);border-radius:999px}
.pill.rd{color:var(--rd);border-color:var(--rd);background:rgba(219,74,68,.11)}
.pill.ac{color:var(--ac);border-color:var(--ac);background:rgba(229,106,21,.12)}
/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login .box{background:var(--sf);border:1px solid var(--bd);border-radius:22px;padding:38px 32px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow)}
.login .box .logo{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.login .box .sub{font-size:.82rem;color:var(--tx2);margin-bottom:24px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:9999;padding:12px 20px;border-radius:12px;font-weight:700;font-size:.86rem;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:90vw}
.toast.ok{background:var(--gn)}.toast.err{background:var(--rd)}.toast.info{background:var(--ac)}
@media(max-width:680px){ .wrap{padding:14px 14px 60px} .hd .sub{display:none} th.hide,td.hide{display:none} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
// Freshpet — Admin Console (back office)
// A second GUI over the SAME Supabase project the handheld field app uses
// (mmkncrsaijexezmhfmiw). One source of truth: routes + payouts edited here
// are the same rows the field app reads, so nothing is mirrored/synced —
// there's only one database. Admin-gated via tech_profiles.role.
// ═══════════════════════════════════════════════════════════════════

var SUPA_URL = 'https://mmkncrsaijexezmhfmiw.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ta25jcnNhaWpleGV6bWhmbWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTkyMjUsImV4cCI6MjA5NjM3NTIyNX0.lx4J-YhlFFrQVJMqjeBXXHNmgZfRe23xYGKZMEL8dPM';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { flowType: 'implicit' } });

// ── shared APBG theme (same-origin localStorage key) ──
function applyTheme(t){ try { document.documentElement.setAttribute('data-apbg-theme', t || (localStorage.getItem('apbg_theme')==='light'?'light':'dark')); } catch(e){} }
window.addEventListener('apbg:themechange', function(e){ applyTheme(e&&e.detail&&e.detail.theme); });
window.addEventListener('storage', function(e){ if(e&&e.key==='apbg_theme') applyTheme(e.newValue); });

// ── state ──
var screen = 'loading';     // loading | login | denied | app
var user = null, profile = null;
var tab = 'overview';        // overview | routes | payments | billing
var ovPeriod = 'all';        // Overview stop-completion window: all | month | prev
var techs = [], assets = [], assignments = [], payouts = [];
var routeTech = '';          // selected tech email in Routes
var routeStops = [];         // working list [{asset_id, asset}] for selected tech
var addSearch = '';
var addSel = {};             // multi-select in the Add-stops list: { asset_id: true }
var payWeek = '';            // selected week_start
var payFrom = null, payTo = null; // Pay report date range (ISO 'YYYY-MM-DD'; '' = unbounded; null = uninitialised → defaults to this month)
var saving = false;

// ── Billing ──
var BILL_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-invoice';
var PAYOUT_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-payout-bill';
var payBusy = false;          // tech-payout bill in flight
var payBillResult = null;     // last payout bill result
var completedPMs = [];        // all completed_pms rows
var billSel = {};             // { id: true } selected for invoicing
var billRate = 30;            // $ per PM (Freshpet default)
var billRecipient = '';       // invoice email recipient
var billSearch = '';
var billShowBilled = true;
var billBusy = false;
var billPreview = null;       // preview result
var billResult = null;        // create result

// ── Added assets (field-found, un-reported) ──
var aaSel = {};               // { pm id: true } added-asset PMs selected for invoicing
var aaRate = 30;              // $ per added-asset PM billed to Freshpet
var aaRecipient = '';         // invoice email recipient
var aaBusy = false;
var aaPreview = null;         // invoice preview result
var aaResult = null;          // invoice create result
var aaPayResult = null;       // vendor payout bill result

// ── Reactive / CSV upload ──
var QUARTERLY_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-quarterly-invoice';
var rvBatches = [];           // existing reactive_batches
var rvFileName = '';
var rvMode = '';              // '' | 'pm' | 'reactive'
var rvRows = null;            // parsed asset records from the CSV
var rvReview = null;          // [{...row, under_warranty, approved}] for reactive
var rvQuarter = '';           // e.g. "2026 Q3"
var rvLocation = '';          // free-text location label
var rvRate = 30;
var rvRecipient = '';
var rvBusy = false;
var rvResult = null;
var rvPMPreview = null;       // {newCount, updateCount, deactivate[], completedDrop}
var rvFilter = 'all';         // review filter: all | out | under
var rvSearch = '';            // review search text
var rvSaved = [];             // saved reactive_assets across all quarters (coverage lookup)
var rvSavedFilter = 'under';  // saved-account lookup filter: all | out | under
var rvSavedSearch = '';       // saved-account lookup search text

// ── Send Invoice (email to Freshpet accounting) ──
var SEND_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-send-invoice';
var siType = 'reactive';      // 'reactive' | 'pm'
var siRef = '';               // selected invoice ref
// Quick-pick recipients. accountspayable@freshpet.com is pre-selected.
var SEND_RECIPIENTS = [
  'accountspayable@freshpet.com', 'roparaku@Freshpet.com',
  'service@brixbev.com', 'invoicing@brixbev.com', 'skypace@brixbev.com', 'marco@brixbev.com',
  'sky@freeflowbev.com', 'sam@freeflowbev.com', 'daniel@freeflowbev.com'
];
var siPicked = { 'accountspayable@freshpet.com': true };  // pre-checked default
var siRecipients = '';        // additional ad-hoc emails (comma-separated)
var siAttach = true;          // attach the invoice PDF
var siBusy = false;
var siResult = null;

function esc(s){ var d=document.createElement('div'); d.textContent = s==null?'':s; return d.innerHTML; }
// Inline SVG icon set (Lucide-style, currentColor). Replaces emoji UI icons.
var ICON_PATHS = {
  'file-text':'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>',
  'receipt':'<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/>',
  'shield':'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>',
  'dollar':'<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  'lock':'<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  'map':'<path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14"/><path d="M15 6v14"/>',
  'paw':'<circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="7.5" cy="12.5" r="2"/><path d="M9.5 16.5c-2.5 1-3.5 2.6-3 4 .5 1.3 2.3 1.5 4 1.2 1.7.3 3.5.1 4-1.2.5-1.4-.5-3-3-4a2.2 2.2 0 0 0-2 0Z"/>',
  'bar-chart':'<line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/>',
  'download':'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
  'mail':'<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
  'eye':'<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
  'plus':'<path d="M5 12h14"/><path d="M12 5v14"/>',
  'check':'<polyline points="20 6 9 17 4 12"/>',
  'check-square':'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  'square':'<rect width="18" height="18" x="3" y="3" rx="2"/>',
  'alert':'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>',
  'wrench':'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"/>',
  'refresh':'<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
  'trash':'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
  'eraser':'<path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/>',
  'link':'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
  'smartphone':'<rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/>',
  'save':'<path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/>',
  'chevron-up':'<path d="m18 15-6-6-6 6"/>',
  'chevron-down':'<path d="m6 9 6 6 6-6"/>',
  'x':'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
};
function icon(n, cls){ var d=ICON_PATHS[n]; if(!d) return ''; return '<svg class="ic-svg'+(cls?' '+cls:'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+d+'</svg>'; }
function money(n){ return '$' + Number(n||0).toFixed(2); }
// Public URL for a stored reactive-invoice PDF (fp-invoices bucket is public).
function fpInvoicePdfUrl(path){ return path ? (SUPA_URL+'/storage/v1/object/public/fp-invoices/'+encodeURIComponent(path)) : ''; }
function fpPortalUrl(ref){ return 'https://alamedapointbg.com/freshpet/portal'+(ref?('?invoice='+encodeURIComponent(ref)):''); }
function toast(msg, type){ var t=document.getElementById('toast'); t.innerHTML='<div class="toast '+(type||'info')+'">'+esc(msg)+'</div>'; setTimeout(function(){ t.innerHTML=''; }, 3500); }

// ── auth ──
async function init(){
  applyTheme();
  var { data:{ session } } = await sb.auth.getSession();
  if (session){ user = session.user; await afterLogin(); }
  else { screen='login'; render(); }
  sb.auth.onAuthStateChange(async function(ev, s){
    if (ev==='SIGNED_IN' && s){ if (user && user.id===s.user.id) { user=s.user; return; } user=s.user; await afterLogin(); }
    else if (ev==='SIGNED_OUT'){ user=null; profile=null; screen='login'; render(); }
  });
}
async function afterLogin(){
  var { data } = await sb.from('tech_profiles').select('*').eq('email', user.email).single();
  profile = data || null;
  if (!profile || profile.role !== 'admin'){ screen='denied'; render(); return; }
  await loadAll();
  screen='app'; render();
}
async function signIn(){ var { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href.split('#')[0] } }); if(error) toast('Login failed: '+error.message,'err'); }
async function signOut(){ await sb.auth.signOut(); }

// ── data ──
async function loadAll(){
  var r = await Promise.all([
    sb.from('tech_profiles').select('*').order('role').order('email'),
    sb.from('assets').select('*').eq('active', true).order('city').order('store'),
    sb.from('route_assignments').select('*').eq('active', true).order('stop_order'),
    sb.from('payouts').select('*').order('week_start', { ascending:false }),
    sb.from('completed_pms').select('id,asset_id,store,serial,pm_date,tech_name,tech_user_id,prev_comp,billed,invoice_doc_number,bill_amount,paid_out,payout_amount,payout_bill_ref,paid_out_at,added_asset,modified_at').order('pm_date', { ascending:false }),
    sb.from('reactive_batches').select('*').order('created_at', { ascending:false }),
    sb.from('reactive_assets').select('*').order('store')
  ]);
  techs = r[0].data || []; assets = r[1].data || []; assignments = r[2].data || []; payouts = r[3].data || [];
  completedPMs = r[4].data || [];
  rvBatches = r[5].data || [];
  rvSaved = r[6].data || [];
  if (!payWeek && payouts.length) payWeek = payouts[0].week_start;
}
function assetById(id){ return assets.find(function(a){ return a.id===id; }); }
function techName(email){ var t=techs.find(function(x){ return x.email===email; }); return (t&&t.name) || email; }

// ── Routes ──
function selectRouteTech(email){
  routeTech = email; addSearch=''; routeStops=[]; addSel={};
  if (email){
    assignments.filter(function(a){ return a.tech_email===email; })
      .sort(function(a,b){ return (a.stop_order||0)-(b.stop_order||0); })
      .forEach(function(a){ var as=assetById(a.asset_id); if(as) routeStops.push({ asset_id:a.asset_id, asset:as }); });
  }
  render();
}
// A serviced stop is COMPLETED and locked — it can't be moved or removed.
function stopCompleted(id){ return completedPMs.some(function(p){ return !p.prev_comp && p.asset_id===id; }); }
function moveStop(i, dir){ var j=i+dir; if(j<0||j>=routeStops.length) return; if(stopCompleted(routeStops[i].asset_id)||stopCompleted(routeStops[j].asset_id)){ toast('Completed stops are locked','info'); return; } var t=routeStops[i]; routeStops[i]=routeStops[j]; routeStops[j]=t; render(); }
function removeStop(i){ if(stopCompleted(routeStops[i].asset_id)){ toast('Completed stops are locked — can\'t remove','info'); return; } routeStops.splice(i,1); render(); }
function addStop(id){ if(routeStops.some(function(s){return s.asset_id===id;})) return; if(assetLockedElsewhere(id)){ toast('That store is on another tech\'s route','err'); return; } var as=assetById(id); if(as){ routeStops.push({asset_id:id, asset:as}); render(); } }
// An asset is claimable by the current tech only if no OTHER tech holds it.
function assetLockedElsewhere(id){
  var owner = assignments.find(function(x){ return x.asset_id===id; });
  return owner && owner.tech_email !== routeTech;
}
function toggleAddSel(id){
  if(assetLockedElsewhere(id)){ toast('That store is on another tech\'s route','err'); return; }
  if(addSel[id]) delete addSel[id]; else addSel[id]=true; render();
}
function toggleAddSelAll(){
  var q = addSearch.trim().toLowerCase();
  var avail = assets.filter(function(a){
    if(routeStops.some(function(s){return s.asset_id===a.id;})) return false;
    if(assetLockedElsewhere(a.id)) return false;   // locked to another tech
    if(!q) return true;
    return ((a.store||'')+' '+(a.city||'')+' '+(a.address||'')+' '+(a.serial||'')).toLowerCase().indexOf(q)>=0;
  });
  var allSel = avail.length>0 && avail.every(function(a){ return addSel[a.id]; });
  avail.forEach(function(a){ if(allSel) delete addSel[a.id]; else addSel[a.id]=true; });
  render();
}
function addSelectedStops(){
  var ids = Object.keys(addSel).filter(function(k){ return addSel[k]; }).map(Number);
  var added = 0, skipped = 0;
  ids.forEach(function(id){
    if(routeStops.some(function(s){return s.asset_id===id;})) return;   // already in list
    if(assetLockedElsewhere(id)){ skipped++; return; }                  // another tech owns it
    var as=assetById(id); if(as){ routeStops.push({asset_id:id, asset:as}); added++; }
  });
  addSel = {};
  toast(added+' stop(s) added'+(skipped?', '+skipped+' skipped (on another tech)':'')+' — Save route to apply', skipped?'info':'ok');
  render();
}
async function saveRoute(){
  if(!routeTech) return;
  // Defensive: drop any stop that a DIFFERENT tech already owns (a store is
  // one-tech-only; the DB enforces this too, but fail clearly, not on insert).
  var conflicts = routeStops.filter(function(s){ return assetLockedElsewhere(s.asset_id); });
  if(conflicts.length){
    routeStops = routeStops.filter(function(s){ return !assetLockedElsewhere(s.asset_id); });
    toast(conflicts.length+' store(s) removed — already on another tech\'s route','err');
    render();
    return;
  }
  // Guard against duplicate asset_ids in the working list.
  var seen = {}; routeStops = routeStops.filter(function(s){ if(seen[s.asset_id]) return false; seen[s.asset_id]=true; return true; });
  saving=true; render();
  // Rebuild the tech's route as one ordered set (same pattern the field app uses).
  var del = await sb.from('route_assignments').delete().eq('tech_email', routeTech);
  if(del.error){ saving=false; render(); return toast('Save failed: '+del.error.message,'err'); }
  if(routeStops.length){
    var rows = routeStops.map(function(s, i){ return { tech_email:routeTech, asset_id:s.asset_id, stop_order:i, route_name:'Primary Route', active:true }; });
    var ins = await sb.from('route_assignments').insert(rows);
    if(ins.error){ saving=false; render(); return toast(ins.error.code==='23505'?'Save failed: a store is already on another tech\'s route':'Save failed: '+ins.error.message,'err'); }
  }
  await loadAll(); saving=false; toast('Route saved for '+techName(routeTech),'ok'); render();
}

// ── Payments ──
function setPayWeek(w){ payWeek=w; render(); }
async function markPaid(id){
  if(!confirm('Mark this payout PAID?')) return;
  var { error } = await sb.from('payouts').update({ status:'paid' }).eq('id', id);
  if(error) return toast('Failed: '+error.message,'err');
  await loadAll(); toast('Marked paid','ok'); render();
}
async function saveRate(email, val){
  var rate = val===''? null : Number(val);
  if(val!=='' && (isNaN(rate)||rate<0)) return toast('Invalid rate','err');
  var { error } = await sb.from('tech_profiles').update({ pm_rate: rate }).eq('email', email);
  if(error) return toast('Failed: '+error.message,'err');
  await loadAll(); toast('Rate saved for '+techName(email),'ok'); render();
}

// ═══ Overview (company-wide + per-contractor) ═══
// Stops: "completed" / "remaining" are scoped to the selected period. Pay:
// "paid out" / "owed" are cumulative — they reflect the full completed_pms
// ledger, not a single period. Everything is attributed to the ROUTE OWNER of
// each asset (not the login that recorded the PM): some contractors (e.g. Bill
// Pace) have no field login of their own, so their stops are logged under
// another account — but the work, completion and pay are still theirs.
// Techs are paid a flat rate per completed PM; when a paid row has no stored
// payout_amount and the tech has no per-PM rate, fall back to DEFAULT_PM_RATE.
var DEFAULT_PM_RATE = 30;
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function isoDate(d){ var p=function(n){ return (n<10?'0':'')+n; }; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function fmtDate(iso){ if(!iso) return ''; var p=String(iso).slice(0,10).split('-'); return MONTHS[(+p[1])-1]+' '+(+p[2]); }
function periodBoundsOf(which){
  if(which==='all') return { start:null, end:null, label:'All time' };
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(which==='prev'){ m-=1; if(m<0){ m=11; y-=1; } }
  var start=new Date(y,m,1), end=new Date(y,m+1,0);
  return { start:isoDate(start), end:isoDate(end), label:MONTHS[m]+' '+y };
}
function periodBounds(){ return periodBoundsOf(ovPeriod); }
function inPeriod(dateStr, b){ if(!b.start) return true; if(!dateStr) return false; var d=String(dateStr).slice(0,10); return d>=b.start && d<=b.end; }

function computeOverview(){
  var b = periodBounds();
  var rateByEmail={}, hasLoginByEmail={};
  techs.forEach(function(t){ rateByEmail[t.email]=t.pm_rate!=null?Number(t.pm_rate):null; hasLoginByEmail[t.email]=!!t.user_id; });
  var rateFor=function(email){ return (email && rateByEmail[email]!=null) ? rateByEmail[email] : DEFAULT_PM_RATE; };
  // owner (active route) of each asset — the attribution key for everything below
  var ownerOf={}; assignments.forEach(function(a){ ownerOf[a.asset_id]=a.tech_email; });
  // assets serviced within the period (exclude PREV COMP — done elsewhere)
  var doneInPeriod={};
  completedPMs.forEach(function(p){ if(p.prev_comp) return; if(!inPeriod(p.pm_date,b)) return; if(p.asset_id!=null) doneInPeriod[p.asset_id]=true; });

  var rows={};
  function bucket(email){ return rows[email]||(rows[email]={email:email, assigned:0, completed:0, paidOut:0, paidPMs:0, unpaid:0, rate:rateByEmail[email]!=null?rateByEmail[email]:null}); }
  // stops: attribute to the route owner so remaining = assigned − completed is always coherent
  assignments.forEach(function(a){ var t=bucket(a.tech_email); t.assigned++; if(doneInPeriod[a.asset_id]) t.completed++; });

  // pay & owed: attribute each completed PM to its asset's ROUTE OWNER (not the
  // login that recorded it). Paid value = stored payout_amount, else the tech's
  // rate, else DEFAULT_PM_RATE. Cumulative (not period-scoped).
  var offRoutePaid=0, offRouteUnpaid=0;
  completedPMs.forEach(function(p){
    if(p.prev_comp) return;
    var owner = p.asset_id!=null ? ownerOf[p.asset_id] : null;
    var val = p.payout_amount!=null ? Number(p.payout_amount) : rateFor(owner);
    if(p.paid_out){
      if(owner){ var t=bucket(owner); t.paidOut+=val; t.paidPMs++; }
      else offRoutePaid+=val;
    } else {
      if(owner) bucket(owner).unpaid++;
      else offRouteUnpaid++;
    }
  });

  var list=Object.keys(rows).map(function(e){
    var r=rows[e]; r.name=techName(e); r.remaining=Math.max(0,r.assigned-r.completed);
    r.owed = r.unpaid * (r.rate!=null?r.rate:DEFAULT_PM_RATE);
    r.noLogin = hasLoginByEmail[e]===false && r.assigned>0; // owns a route but has no field login (PMs logged elsewhere)
    return r;
  }).sort(function(a,b){ return b.assigned-a.assigned || (b.paidOut-a.paidOut); });

  // company totals (assigned/completed/remaining = route stops; pay incl. off-route)
  var assignedAssets=Object.keys(ownerOf).length;
  var completedAssigned=0; Object.keys(ownerOf).forEach(function(id){ if(doneInPeriod[id]) completedAssigned++; });
  var offRoute=0; Object.keys(doneInPeriod).forEach(function(id){ if(!ownerOf[id]) offRoute++; });
  var contribPaid=0, contribOwed=0, contribUnpaid=0;
  list.forEach(function(r){ contribPaid+=r.paidOut; contribOwed+=r.owed; contribUnpaid+=r.unpaid; });

  return { b:b, list:list, offRoutePaid:offRoutePaid, offRouteUnpaid:offRouteUnpaid, contribPaid:contribPaid, contribOwed:contribOwed, company:{
    assigned:assignedAssets, completed:completedAssigned, remaining:Math.max(0,assignedAssets-completedAssigned),
    offRoute:offRoute,
    paidOut:contribPaid+offRoutePaid,
    owed:contribOwed+offRouteUnpaid*DEFAULT_PM_RATE,
    unpaid:contribUnpaid+offRouteUnpaid,
    activeAssets:assets.length, unassigned:Math.max(0,assets.length-assignedAssets)
  }};
}

function renderOverview(){
  var o=computeOverview(), c=o.company;
  var pct=function(done,tot){ return tot>0?Math.round(done/tot*100):0; };
  var cp=pct(c.completed,c.assigned);

  var periodStops = ovPeriod==='all' ? 'all time' : esc(o.b.label);
  var h='<div class="card"><div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap"><div style="flex:1;min-width:220px"><h3>Company overview</h3>'
    + '<div class="hint">Stops completed &amp; remaining ('+periodStops+') across every route. Each completed stop earns the tech '+money(DEFAULT_PM_RATE)+'/PM; paid-out &amp; owed are cumulative from the PM ledger. A stop can only be on one tech\'s route — enforced in the database.</div></div>'
    + '<div class="seg" style="flex:none">'
    + '<button class="'+(ovPeriod==='all'?'on':'')+'" onclick="ovPeriod=\'all\';render()">All time</button>'
    + '<button class="'+(ovPeriod==='month'?'on':'')+'" onclick="ovPeriod=\'month\';render()">This month</button>'
    + '<button class="'+(ovPeriod==='prev'?'on':'')+'" onclick="ovPeriod=\'prev\';render()">Last month</button>'
    + '</div></div>';

  h+='<div class="tiles">'
    + '<div class="tile"><div class="lb">Assigned stops</div><div class="v ac">'+c.assigned+'</div><div class="sub">'+c.unassigned+' unassigned · '+c.activeAssets+' active assets</div></div>'
    + '<div class="tile"><div class="lb">Completed</div><div class="v gn">'+c.completed+'</div><div class="bar" style="margin-top:8px"><i style="width:'+cp+'%"></i></div><div class="sub">'+cp+'% of assigned'+(c.offRoute?' · +'+c.offRoute+' off-route':'')+'</div></div>'
    + '<div class="tile"><div class="lb">Remaining</div><div class="v am">'+c.remaining+'</div><div class="sub">'+(ovPeriod==='all'?'never serviced':'still to service this period')+'</div></div>'
    + '<div class="tile"><div class="lb">Paid out</div><div class="v gn">'+money(c.paidOut)+'</div><div class="sub">cumulative to contractors'+(o.offRoutePaid?' · incl '+money(o.offRoutePaid)+' off-route':'')+'</div></div>'
    + '<div class="tile"><div class="lb">Owed (unpaid)</div><div class="v '+(c.owed?'am':'')+'">'+money(c.owed)+'</div><div class="sub">'+c.unpaid+' unpaid PM'+(c.unpaid===1?'':'s')+'</div></div>'
    + '</div></div>';

  h+='<div class="card"><h3>By contractor</h3><div class="hint">Stops completed &amp; remaining ('+periodStops+') per contractor; paid-out &amp; owed are cumulative. Everything is credited to whoever\'s route the stop is on, even if the PM was logged under a different field login.</div>';
  if(!o.list.length){ h+='<div class="empty">No routes or completed PMs yet.</div></div>'; return h; }
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Contractor</th><th class="num">Assigned</th><th class="num">Completed</th><th class="num">Remaining</th><th style="width:120px">Progress</th><th class="num">Paid out</th><th class="num">Owed</th></tr></thead><tbody>';
  o.list.forEach(function(r){
    var p=pct(r.completed,r.assigned);
    h+='<tr><td>'+esc(r.name)+(r.noLogin?' <span class="pill dim" title="No field login of their own — their PMs are recorded under another account. Stops and pay are still credited to them here.">no app login</span>':'')+'<div class="muted" style="font-size:.72rem">'+esc(r.email)+'</div></td>'
      + '<td class="num">'+r.assigned+'</td>'
      + '<td class="num">'+r.completed+'</td>'
      + '<td class="num">'+(r.remaining>0?'<span class="pill am">'+r.remaining+'</span>':'<span class="pill gn">0</span>')+'</td>'
      + '<td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="flex:1"><i style="width:'+p+'%"></i></div><span class="muted" style="font-size:.72rem;flex:none">'+p+'%</span></div></td>'
      + '<td class="num">'+money(r.paidOut)+(r.paidPMs?'<div class="muted" style="font-size:.68rem">'+r.paidPMs+' PMs</div>':'')+'</td>'
      + '<td class="num">'+(r.owed>0?money(r.owed):'<span class="muted">'+money(0)+'</span>')+'</td></tr>';
  });
  h+='<tr class="tot"><td>Total</td><td class="num">'+c.assigned+'</td><td class="num">'+c.completed+'</td><td class="num">'+c.remaining+'</td><td></td><td class="num">'+money(o.contribPaid)+'</td><td class="num">'+money(o.contribOwed)+'</td></tr>';
  h+='</tbody></table></div>';
  if(o.offRoutePaid||o.company.offRoute){ h+='<div class="muted" style="margin-top:8px;font-size:.76rem">'+(o.company.offRoute||0)+' off-route stop(s) serviced (not on any tech\'s route)'+(o.offRoutePaid?' · '+money(o.offRoutePaid)+' paid':'')+' — included in the company totals above, not the per-contractor rows.</div>'; }
  h+='<div class="muted" style="margin-top:6px;font-size:.78rem">Need to bill Freshpet or pay a contractor? Use the '+icon('receipt')+' Billing and '+icon('dollar')+' Payments tabs.</div>';
  h+='</div>';
  return h;
}

function renderRoutes(){
  var assignedIds = {}; assignments.forEach(function(a){ assignedIds[a.asset_id]=a.tech_email; });
  var techOpts = '<option value="">— select a technician —</option>' + techs.map(function(t){
    var n = assignments.filter(function(a){return a.tech_email===t.email;}).length;
    return '<option value="'+esc(t.email)+'"'+(t.email===routeTech?' selected':'')+'>'+esc(t.name||t.email)+(n?' ('+n+' stops)':'')+'</option>';
  }).join('');

  var h = '<div class="card"><h3>Load routes</h3><div class="hint">Pick a technician, build their ordered stop list, then Save. This writes the same <span class="mono">route_assignments</span> rows the handheld app reads — the field route updates the moment you save.</div>';
  h += '<label class="f">Technician</label><select onchange="selectRouteTech(this.value)" style="max-width:420px">'+techOpts+'</select></div>';

  if(!routeTech) return h + '<div class="card"><div class="empty">Select a technician to view and edit their route.</div></div>';

  // Completion (PMs are ANNUAL): a stop is COMPLETED once it has any serviced
  // completed_pms row. Completed stops are LOCKED — they stay on the route and
  // can't be reordered, removed, or paid again until a fresh list is loaded.
  var done = {};
  completedPMs.forEach(function(p){
    if(p.prev_comp || p.asset_id==null) return;
    var d = String(p.pm_date||'').slice(0,10);
    if(!done[p.asset_id] || d>done[p.asset_id]) done[p.asset_id]=d;
  });
  var doneCount = routeStops.filter(function(s){ return done[s.asset_id]; }).length;
  var openCount = routeStops.length - doneCount;

  // Current route
  h += '<div class="row">';
  h += '<div class="col"><div class="card"><h3>'+esc(techName(routeTech))+' · route <span class="muted">('+routeStops.length+' stops)</span></h3>'
     + '<div class="hint">PMs are annual. Once a stop is serviced it shows <span style="color:var(--gn);font-weight:800">COMPLETED</span> and locks — it can\'t be reordered, removed, or paid again. <span style="color:var(--gn);font-weight:700">'+doneCount+' completed</span> · <span style="color:var(--am);font-weight:700">'+openCount+' open</span>.</div>';
  if(!routeStops.length){ h += '<div class="empty">No stops yet. Add stores from the right.</div>'; }
  else {
    routeStops.forEach(function(s,i){
      var a=s.asset;
      var d=done[s.asset_id];
      var status = d
        ? '<span class="pill gn" style="flex:none;font-weight:800">✓ COMPLETED</span>'
        : '<span class="pill dim" style="flex:none">open</span>';
      var acts = d
        ? '<span class="ic" title="Completed — locked" aria-label="Completed — locked" style="opacity:.55;cursor:default">'+icon('lock')+'</span>'
        : '<button class="ic" onclick="moveStop('+i+',-1)" '+(i===0?'disabled':'')+' title="Move up" aria-label="Move up">'+icon('chevron-up')+'</button>'
          + '<button class="ic" onclick="moveStop('+i+',1)" '+(i===routeStops.length-1?'disabled':'')+' title="Move down" aria-label="Move down">'+icon('chevron-down')+'</button>'
          + '<button class="ic" onclick="removeStop('+i+')" title="Remove stop" aria-label="Remove stop">'+icon('x')+'</button>';
      h += '<div class="stop"'+(d?' style="border-color:var(--gn)"':'')+'><div class="n"'+(d?' style="background:var(--gn)"':'')+'>'+(i+1)+'</div><div class="meta"><div class="s">'+esc(a.store||a.serial||('Asset '+a.id))+'</div><div class="a">'+esc([a.address,a.city,a.state].filter(Boolean).join(', '))+(d?' · completed '+esc(fmtDate(d)):'')+'</div></div>'
        + status
        + '<div class="acts">'+acts+'</div></div>';
    });
  }
  h += '<div style="margin-top:14px;display:flex;gap:10px"><button class="btn gn" onclick="saveRoute()" '+(saving?'disabled':'')+'>'+(saving?'Saving…':''+icon('save')+' Save route')+'</button><button class="btn o" onclick="selectRouteTech(routeTech)">'+icon('refresh')+' Reset</button></div>';
  h += '</div></div>';

  // Add stores
  var q = addSearch.trim().toLowerCase();
  var avail = assets.filter(function(a){
    if(routeStops.some(function(s){return s.asset_id===a.id;})) return false; // already in the working list
    if(assignedIds[a.id]===routeTech) return false;                           // already saved to THIS tech
    if(!q) return true;
    return ((a.store||'')+' '+(a.city||'')+' '+(a.address||'')+' '+(a.serial||'')).toLowerCase().indexOf(q)>=0;
  });
  function isLocked(a){ return assignedIds[a.id] && assignedIds[a.id]!==routeTech; } // on another tech's route
  var addableIds = avail.filter(function(a){ return !isLocked(a); }).map(function(a){ return a.id; });
  var addSelCount = Object.keys(addSel).filter(function(k){ return addSel[k]; }).length;
  var allAvailSel = addableIds.length>0 && addableIds.every(function(id){ return addSel[id]; });
  h += '<div class="col"><div class="card"><h3>Add stops</h3><div class="hint">Tick multiple stores and add them together, or use the row + button for one. Stores already on another tech\'s route are '+icon('lock')+' locked — a store can only belong to one tech.</div>';
  h += '<input type="search" placeholder="Search store, city, address, serial…" value="'+esc(addSearch)+'" oninput="addSearch=this.value;render();this.focus()">';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0 4px">';
  if(addableIds.length){ h += '<button class="btn o sm" onclick="toggleAddSelAll()">'+(allAvailSel?''+icon('check-square')+' Deselect shown':''+icon('square')+' Select all shown')+'</button>'; }
  h += '<span class="muted" style="font-size:.8rem">'+addSelCount+' selected</span>';
  if(addSelCount){ h += '<button class="btn sm" style="margin-left:auto" onclick="addSelectedStops()">'+icon('plus')+' Add '+addSelCount+' selected</button><button class="btn o sm" onclick="addSel={};render()">Clear</button>'; }
  h += '</div>';
  h += '<div class="addlist">';
  if(!avail.length){ h += '<div class="empty">No matching stores.</div>'; }
  else {
    var byCity={}; avail.forEach(function(a){ (byCity[a.city||'—']||(byCity[a.city||'—']=[])).push(a); });
    Object.keys(byCity).sort().forEach(function(city){
      h += '<div class="grp-h">'+esc(city)+'</div>';
      byCity[city].forEach(function(a){
        var other = isLocked(a);
        var ck = !!addSel[a.id];
        var left = other
          ? '<span style="width:18px;flex:none;text-align:center">'+icon('lock')+'</span>'
          : '<input type="checkbox" style="width:18px;height:18px;flex:none" onclick="toggleAddSel('+a.id+')"'+(ck?' checked':'')+'>';
        var right = other
          ? '<span class="pill dim" style="flex:none">on '+esc(techName(assignedIds[a.id]))+'</span>'
          : '<button class="btn sm" onclick="addStop('+a.id+')">+ Add</button>';
        h += '<div class="addrow"'+(other?' style="opacity:.6"':'')+'>'+left+'<div class="meta"><div class="s" style="font-weight:700;font-size:.86rem">'+esc(a.store||a.serial)+'</div><div class="a muted" style="font-size:.74rem">'+esc([a.address,a.city].filter(Boolean).join(', '))+'</div></div>'+right+'</div>';
      });
    });
  }
  h += '</div></div></div>';
  h += '</div>';
  return h;
}

async function createPayoutBill(techUserId){
  var t = techs.find(function(x){ return x.user_id===techUserId; });
  if(!t) return;
  var unpaid = completedPMs.filter(function(p){ return !p.prev_comp && !p.paid_out && p.tech_user_id===techUserId; });
  var rate = t.pm_rate!=null ? Number(t.pm_rate) : null;
  if(rate==null || rate<=0) return toast('Set a per-PM rate for '+(t.name||t.email)+' first (below)','err');
  if(!unpaid.length) return toast('No unpaid PMs for this tech','err');
  if(!confirm('Create a QuickBooks BILL to '+(t.name||t.email)+' for '+unpaid.length+' PM'+(unpaid.length===1?'':'s')+' @ '+money(rate)+' = '+money(unpaid.length*rate)+'?\n\nThis posts a real vendor bill in QBO and marks these PMs paid out.')) return;
  payBusy=true; payBillResult=null; render();
  try{
    var token = await billToken();
    var res = await fetch(PAYOUT_FN, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ mode:'create', techUserId:techUserId, rate:rate }) });
    var j = await res.json();
    if(!res.ok) throw new Error(j.error || ('HTTP '+res.status));
    payBillResult = j;
    await loadAll();
    toast('Bill #'+(j.bill&&j.bill.docNumber)+' created for '+(j.bill&&j.bill.vendor),'ok');
  }catch(e){ toast('Failed: '+e.message,'err'); }
  payBusy=false; render();
}

function renderTechPay(){
  var byTech={}, paidCount={};
  completedPMs.forEach(function(p){
    if(!p.tech_user_id) return;
    if(p.paid_out){ paidCount[p.tech_user_id]=(paidCount[p.tech_user_id]||0)+1; return; }
    if(p.prev_comp) return;
    (byTech[p.tech_user_id]=byTech[p.tech_user_id]||[]).push(p);
  });
  var h = '<div class="card"><h3>Technician pay</h3><div class="hint">Each completed PM (per asset, <span class="mono">PREV COMP</span> excluded) earns the tech their per-PM rate. Create a QuickBooks <strong>bill</strong> (what we owe the tech) for their unpaid PMs — separate from what we invoice Freshpet. Set/edit rates in the Per-PM rates section below.</div>';

  if(payBillResult){
    var b=payBillResult.bill||{};
    h += '<div class="card" style="background:var(--sf2);border-color:var(--gn);margin:0 0 14px"><h3 style="color:var(--gn)">✓ Bill #'+esc(b.docNumber)+' created</h3>'
       + '<div class="muted" style="font-size:.85rem">'+payBillResult.paidCount+' PM(s) · '+money(b.total)+' · vendor '+esc(b.vendor)+'</div>'
       + ((payBillResult.warnings&&payBillResult.warnings.length)?'<div style="margin-top:8px;color:var(--am);font-size:.82rem">'+icon('alert')+' '+payBillResult.warnings.map(esc).join('<br>'+icon('alert')+' ')+'</div>':'')
       + '</div>';
  }

  var rows = techs.filter(function(t){ return t.user_id && ((byTech[t.user_id]&&byTech[t.user_id].length) || paidCount[t.user_id]); });
  if(!rows.length){ h += '<div class="empty" style="padding:20px">No technician pay to show yet.</div>'; h += '</div>'; return h; }
  h += '<div style="overflow-x:auto"><table><thead><tr><th>Technician</th><th class="num">Unpaid PMs</th><th class="num">Rate / PM</th><th class="num">Owed</th><th>Paid to date</th><th></th></tr></thead><tbody>';
  rows.forEach(function(t){
    var unpaid = (byTech[t.user_id]||[]).length;
    var rate = t.pm_rate!=null?Number(t.pm_rate):null;
    var owed = rate!=null ? unpaid*rate : null;
    h += '<tr><td>'+esc(t.name||t.email)+'<div class="muted" style="font-size:.72rem">'+esc(t.email)+'</div></td>'
       + '<td class="num">'+unpaid+'</td>'
       + '<td class="num">'+(rate!=null?money(rate):'<span class="muted">—</span>')+'</td>'
       + '<td class="num">'+(owed!=null?money(owed):'<span class="muted">set rate</span>')+'</td>'
       + '<td>'+(paidCount[t.user_id]?'<span class="pill gn">'+paidCount[t.user_id]+' paid</span>':'<span class="muted">—</span>')+'</td>'
       + '<td>'+((unpaid&&rate!=null)?'<button class="btn gn sm" onclick="createPayoutBill(\''+esc(t.user_id)+'\')" '+(payBusy?'disabled':'')+'>'+(payBusy?'Working…':''+icon('dollar')+' Create QBO bill')+'</button>':'')+'</td></tr>';
  });
  h += '</tbody></table></div></div>';
  return h;
}

// ── Pay report (date range, by contractor) ──
function setPayFrom(v){ payFrom=v; render(); }
function setPayTo(v){ payTo=v; render(); }
function payPreset(which){
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(which==='this'){ payFrom=isoDate(new Date(y,m,1)); payTo=isoDate(new Date(y,m+1,0)); }
  else if(which==='last'){ payFrom=isoDate(new Date(y,m-1,1)); payTo=isoDate(new Date(y,m,0)); }
  else { payFrom=''; payTo=''; } // all time
  render();
}
function payInRange(dateStr){ var d=String(dateStr||'').slice(0,10); if(payFrom && d<payFrom) return false; if(payTo && d>payTo) return false; return true; }
function renderPayReport(){
  // Lazy default → current month (so history is one click away via presets).
  if(payFrom===null){ var n=new Date(); payFrom=isoDate(new Date(n.getFullYear(),n.getMonth(),1)); payTo=isoDate(new Date(n.getFullYear(),n.getMonth()+1,0)); }
  var rateByEmail={}; techs.forEach(function(t){ rateByEmail[t.email]=t.pm_rate!=null?Number(t.pm_rate):null; });
  var rateFor=function(e){ return (e && rateByEmail[e]!=null) ? rateByEmail[e] : DEFAULT_PM_RATE; };
  var ownerOf={}; assignments.forEach(function(a){ ownerOf[a.asset_id]=a.tech_email; });
  var rows={}; function bk(e){ return rows[e]||(rows[e]={email:e, pms:0, paidPMs:0, unpaidPMs:0, paid:0, owed:0}); }
  var off={email:'(off-route)', pms:0, paidPMs:0, unpaidPMs:0, paid:0, owed:0};
  completedPMs.forEach(function(p){
    if(p.prev_comp) return; if(!payInRange(p.pm_date)) return;
    var owner = p.asset_id!=null ? ownerOf[p.asset_id] : null;
    var rate = rateFor(owner);
    var val = p.payout_amount!=null ? Number(p.payout_amount) : rate;
    var t = owner ? bk(owner) : off;
    t.pms++;
    if(p.paid_out){ t.paidPMs++; t.paid+=val; } else { t.unpaidPMs++; t.owed+=rate; }
  });
  var list = Object.keys(rows).map(function(e){ var r=rows[e]; r.name=techName(e); return r; }).sort(function(a,b){ return b.pms-a.pms; });
  if(off.pms) list.push(off);

  var rangeLbl = (!payFrom && !payTo) ? 'All time' : ((payFrom?fmtDate(payFrom):'…')+' – '+(payTo?fmtDate(payTo):'…'));
  var h = '<div class="card"><div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><h3>Pay report <span class="muted" style="font-weight:600">· '+esc(rangeLbl)+'</span></h3>'
    + '<div class="hint">Per-contractor pay for any date range, from the full completed-PM history. Each completed PM earns '+money(DEFAULT_PM_RATE)+' (or the tech\'s set rate). Credited to whoever\'s route the stop is on. Pick a range to see past periods.</div></div>'
    + '<div class="seg" style="flex:none">'
    + '<button onclick="payPreset(\'this\')">This month</button><button onclick="payPreset(\'last\')">Last month</button><button onclick="payPreset(\'all\')">All time</button>'
    + '</div></div>';
  h += '<div class="row" style="align-items:flex-end;margin-bottom:8px">'
    + '<div style="flex:none"><label class="f">From</label><input type="date" value="'+esc(payFrom||'')+'" onchange="setPayFrom(this.value)" style="max-width:180px"></div>'
    + '<div style="flex:none"><label class="f">To</label><input type="date" value="'+esc(payTo||'')+'" onchange="setPayTo(this.value)" style="max-width:180px"></div>'
    + '</div>';
  if(!list.length){ h += '<div class="empty">No completed PMs in this range.</div></div>'; return h; }
  h += '<div style="overflow-x:auto"><table><thead><tr><th>Contractor</th><th class="num">PMs done</th><th class="num">Paid</th><th class="num">$ paid</th><th class="num">Unpaid</th><th class="num">$ owed</th></tr></thead><tbody>';
  var tP=0,tPaidN=0,tPd=0,tU=0,tO=0;
  list.forEach(function(r){
    tP+=r.pms; tPaidN+=r.paidPMs; tPd+=r.paid; tU+=r.unpaidPMs; tO+=r.owed;
    h += '<tr><td>'+esc(r.name)+(r.email!=='(off-route)'?'<div class="muted" style="font-size:.72rem">'+esc(r.email)+'</div>':'')+'</td>'
      + '<td class="num">'+r.pms+'</td>'
      + '<td class="num">'+r.paidPMs+'</td>'
      + '<td class="num">'+money(r.paid)+'</td>'
      + '<td class="num">'+(r.unpaidPMs?'<span class="pill am">'+r.unpaidPMs+'</span>':'0')+'</td>'
      + '<td class="num">'+(r.owed>0?money(r.owed):money(0))+'</td></tr>';
  });
  h += '<tr class="tot"><td>Total</td><td class="num">'+tP+'</td><td class="num">'+tPaidN+'</td><td class="num">'+money(tPd)+'</td><td class="num">'+tU+'</td><td class="num">'+money(tO)+'</td></tr>';
  h += '</tbody></table></div></div>';
  return h;
}

function renderPayments(){
  // distinct weeks present in payouts
  var weeks=[]; payouts.forEach(function(p){ if(weeks.indexOf(p.week_start)<0) weeks.push(p.week_start); });
  weeks.sort().reverse();
  if(!payWeek && weeks.length) payWeek=weeks[0];

  // Date-range pay report (history), then the actionable per-tech bill tool.
  var h = renderPayReport();
  h += renderTechPay();
  // Weekly payouts (tech-submitted snapshots, if any)
  var weekOpts = weeks.length ? weeks.map(function(w){ var p=payouts.find(function(x){return x.week_start===w;}); var end=p?p.week_end:''; return '<option value="'+esc(w)+'"'+(w===payWeek?' selected':'')+'>'+esc(w)+(end?' → '+esc(end):'')+'</option>'; }).join('') : '<option value="">— no submitted payouts —</option>';
  var wk = payouts.filter(function(p){ return p.week_start===payWeek; });
  var total = wk.reduce(function(s,p){ return s+Number(p.amount||0); },0);
  var paid = wk.filter(function(p){return p.status==='paid';}).reduce(function(s,p){return s+Number(p.amount||0);},0);

  h += '<div class="card"><h3>Weekly payouts</h3><div class="hint">Submitted by techs from the field app — review and mark paid here. Same <span class="mono">payouts</span> rows; the tech sees “PAID” instantly.</div>';
  h += '<label class="f">Week</label><select onchange="setPayWeek(this.value)" style="max-width:320px">'+weekOpts+'</select>';
  if(!wk.length){ h += '<div class="empty">No payouts for this week.</div>'; }
  else {
    h += '<div style="overflow-x:auto;margin-top:14px"><table><thead><tr><th>Technician</th><th class="num">Stores</th><th class="num hide">PMs</th><th class="num">Amount</th><th>Status</th><th></th></tr></thead><tbody>';
    wk.forEach(function(p){
      var paidPill = p.status==='paid' ? '<span class="pill gn">Paid</span>' : '<span class="pill am">Submitted</span>';
      var nItems = Array.isArray(p.details)?p.details.length:(p.store_count||0);
      h += '<tr><td>'+esc(techName(p.tech_email))+'<div class="muted" style="font-size:.72rem">'+esc(p.tech_email)+'</div></td>'
         + '<td class="num">'+(p.store_count||0)+'</td>'
         + '<td class="num hide">'+nItems+'</td>'
         + '<td class="num">'+money(p.amount)+'</td>'
         + '<td>'+paidPill+'</td>'
         + '<td>'+(p.status==='paid'?'':'<button class="btn gn sm" onclick="markPaid('+p.id+')">Mark paid</button>')+'</td></tr>';
    });
    h += '<tr class="tot"><td>Total</td><td class="num"></td><td class="num hide"></td><td class="num">'+money(total)+'</td><td colspan="2" class="muted" style="font-weight:600">'+money(paid)+' paid · '+money(total-paid)+' outstanding</td></tr>';
    h += '</tbody></table></div>';
  }
  h += '</div>';

  // Rates
  h += '<div class="card"><h3>Per-PM rates</h3><div class="hint">Flat rate paid per completed PM for each tech (overrides per-asset fees). Stored on <span class="mono">tech_profiles.pm_rate</span>.</div>';
  h += '<div style="overflow-x:auto"><table><thead><tr><th>Technician</th><th>Role</th><th class="num">Rate / PM</th><th></th></tr></thead><tbody>';
  techs.forEach(function(t){
    h += '<tr><td>'+esc(t.name||t.email)+'<div class="muted" style="font-size:.72rem">'+esc(t.email)+'</div></td>'
       + '<td><span class="pill '+(t.role==='admin'?'am':'dim')+'">'+esc(t.role||'tech')+'</span></td>'
       + '<td class="num"><input type="number" step="0.01" min="0" id="rate_'+esc(t.email)+'" value="'+(t.pm_rate!=null?Number(t.pm_rate):'')+'" placeholder="—" style="max-width:120px;text-align:right"></td>'
       + '<td><button class="btn o sm" onclick="saveRate(\''+esc(t.email)+'\', document.getElementById(\'rate_'+esc(t.email)+'\').value)">Save</button></td></tr>';
  });
  h += '</tbody></table></div></div>';
  return h;
}

// ═══ Billing (Freshpet) ═══
async function billToken(){ var { data:{ session } } = await sb.auth.getSession(); return session && session.access_token; }
// completed_pms has no city column — derive it from the linked asset.
function cityOf(p){ var a = assetById(p.asset_id); return (a && a.city) || ''; }
function billableList(){
  var q = billSearch.trim().toLowerCase();
  return completedPMs.filter(function(p){
    if (p.prev_comp) return false;                 // done elsewhere — never billed
    if (!billShowBilled && p.billed) return false;
    if (!q) return true;
    return ((p.store||'')+' '+cityOf(p)+' '+(p.serial||'')+' '+(p.tech_name||'')).toLowerCase().indexOf(q)>=0;
  });
}
function toggleBill(id){ if(billSel[id]) delete billSel[id]; else billSel[id]=true; billPreview=null; render(); }
function selectAllBill(){
  var list = billableList().filter(function(p){ return !p.billed; });
  var allSel = list.length && list.every(function(p){ return billSel[p.id]; });

async function grantPortal(){
  var el = document.getElementById('fp_email');
  var email = (el && el.value || '').trim().toLowerCase();
  if(!email || email.indexOf('@')<0) return toast('Enter a valid email','err');

    ? await sb.from('tech_profiles').update({ role:'freshpet' }).eq('email', existing.email)
    : await sb.from('tech_profiles').insert({ email:email, name:email.split('@')[0], role:'freshpet' });

async function markReported(id){
  var a = assets.find(function(x){ return x.id===id; }); if(!a) return;
  if(!confirm('Mark this asset as REPORTED to Freshpet?\n\n'+(a.store||'')+' — S/N '+(a.serial||'')+'\n\nDo this once Freshpet has been told the unit exists (it should show up in their next asset export).')) return;

// ═══ Reactive / CSV upload ═══
function parseCSV(text){
  var rows=[], row=[], cur='', inQ=false;
  for(var i=0;i<text.length;i++){ var c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else { inQ=false; } } else { cur+=c; } }
    else if(c==='"'){ inQ=true; }
    else if(c===','){ row.push(cur); cur=''; }
    else if(c==='\n'){ row.push(cur); cur=''; if(row.some(function(x){return x.trim()!=='';})) rows.push(row); row=[]; }
    else if(c!=='\r'){ cur+=c; }
  }
  row.push(cur); if(row.some(function(x){return x.trim()!=='';})) rows.push(row);
  return rows;
}
var CSV_COLMAP = {
  store:['account name','store','store name'],
  address:['shipping address line 1','address','shipping street'],
  city:['shipping city','city'], state:['shipping state/province','state','state/province'],
  zip:['shipping zip/postal code','zip','zip/postal code','zip code','postal code'],
  phone:['phone'], manufacturer:['manufacturer'], model:['model'],
  serial:['asset: serial number','serial number','serial'],
  warranty:['warranty status','warranty'],
  warranty_end:['unit warranty end date','warranty end date','warranty end']
};
function mapCSVHeader(headerRow){
  var idx={}; headerRow.forEach(function(cell,i){ var n=cell.trim().toLowerCase().replace(/^location:\s*/,'');
    for(var f in CSV_COLMAP){ if(idx[f]===undefined && CSV_COLMAP[f].indexOf(n)>-1) idx[f]=i; } });
  return idx;
}
// Decide out-of-warranty (billable) from the Freshpet "Warranty Status" column.
// Live values are literally "OUT" (out of warranty → BILLED) and "UNDER" (under
// warranty → imported so we can verify coverage, but NOT billed). The status is
// authoritative; the "Unit Warranty End Date" is only a fallback when the
// status is blank/ambiguous. Admin can still flip any row in the review.
// Returns true = out of warranty (billable).
function isOutOfWarranty(status, end){
  var s=(status||'').trim().toLowerCase();
  // Under warranty → not billed
  if(/\bunder\b|in[\s-]?warranty|\bactive\b|\bcovered\b|\bvalid\b|\byes\b/.test(s)) return false;
  // Out of warranty / expired → billed
  if(/\bout\b|out[\s-]?of[\s-]?warranty|\bexpired\b|\bno\b|\bnone\b|n\/a/.test(s)) return true;
  // Blank/ambiguous status → use the warranty end date (past = expired = billed)
  var e=(end||'').trim(); if(e){ var d=Date.parse(e); if(!isNaN(d)) return d < Date.now(); }
  return true; // default to billable when nothing is known
}
// Turn a raw grid (array of arrays; row 0 = headers) into asset records.
function rowsToAssetRecords(raw){
  if(!raw || raw.length<2){ toast('File appears empty','err'); return null; }
  var idx=mapCSVHeader(raw[0].map(function(c){ return c==null?'':String(c); }));
  var need=['store','city','serial']; var miss=need.filter(function(f){ return idx[f]===undefined; });
  if(miss.length){ toast('File missing columns: '+miss.join(', '),'err'); return null; }
  var out=[], noSerial=0;
  for(var i=1;i<raw.length;i++){ var r=raw[i]||[];
    var g=function(f){ var v=idx[f]!==undefined ? r[idx[f]] : ''; return v==null?'':String(v).trim(); };
    var serial=g('serial'), store=g('store');
    if(!serial && !store) continue;   // truly empty row — skip
    if(!serial) noSerial++;            // keep it (serial can be filled in later); just count it
    out.push({ store:store, address:g('address'), city:g('city'), state:g('state')||'CA', zip:g('zip'),
      phone:g('phone'), manufacturer:g('manufacturer'), model:g('model'), serial:serial,
      warranty:g('warranty'), warranty_end:g('warranty_end') });
  }
  if(noSerial) toast(out.length+' assets loaded · '+noSerial+' have no serial number (still included)','info');
  return out;
}
function onReactiveCSV(input){
  var file=input.files&&input.files[0]; if(!file) return;
  rvFileName=file.name; rvMode=''; rvRows=null; rvReview=null; rvPMPreview=null; rvResult=null;
  var isXls=/\.xlsx?$/i.test(file.name);
  if(isXls && typeof XLSX==='undefined'){ toast('Excel reader not loaded — try a CSV, or reload','err'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var raw;
    try{
      if(isXls){
        var wb=XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        var ws=wb.Sheets[wb.SheetNames[0]];
        raw=XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false, defval:'' });

}

// ── PM reset ──
function buildPMPreview(){
  var bySerial={}; assets.forEach(function(a){ bySerial[a.serial]=a; });
  var fileSerials={}; rvRows.forEach(function(x){ fileSerials[x.serial]=1; });
  var completedSerials={}; completedPMs.forEach(function(p){ completedSerials[p.serial]=1; });
  var newCount=0, updateCount=0;
  rvRows.forEach(function(x){ if(bySerial[x.serial]) updateCount++; else newCount++; });
  // Un-reported field-added assets can't be in Freshpet's export yet — keep them.
  var deactivate=assets.filter(function(a){ return !fileSerials[a.serial] && !(a.source==='field' && a.reported===false); });
  var keptField=assets.filter(function(a){ return !fileSerials[a.serial] && a.source==='field' && a.reported===false; }).length;
  // assignments dropped = those whose asset is completed; kept = uncompleted
  var completedAssignments = assignments.filter(function(a){ var as=assetById(a.asset_id); return as && completedSerials[as.serial]; });
  rvPMPreview={ newCount:newCount, updateCount:updateCount, deactivate:deactivate, keptField:keptField, dropAssign:completedAssignments.length, keepAssign:assignments.length-completedAssignments.length };
  render();
}
async function applyPMReset(){
  if(!rvRows) return;
  var p=rvPMPreview||{};
  if(!confirm('This resets the PM routes loaded as of '+new Date().toLocaleDateString()+'.\n\n• '+p.newCount+' new locations added (unassigned)\n• '+p.updateCount+' existing updated\n• '+(p.deactivate?p.deactivate.length:0)+' removed (deactivated)\n• '+p.dropAssign+' completed stops unassigned; '+p.keepAssign+' pending assignments kept\n\nAll completed PM history is preserved. Continue?')) return;
  rvBusy=true; render();
  try{
    // Upsert assets by serial
    var bySerial={}; assets.forEach(function(a){ bySerial[a.serial]=a; });
    var completedSerials={}; completedPMs.forEach(function(x){ completedSerials[x.serial]=1; });
    for(var i=0;i<rvRows.length;i++){ var x=rvRows[i]; var ex=bySerial[x.serial];
      var rec={ store:x.store, address:x.address, city:x.city, state:x.state, zip:x.zip, phone:x.phone,
        manufacturer:x.manufacturer, model:x.model, serial:x.serial, warranty:x.warranty, active:true };
      if(ex){ await sb.from('assets').update(rec).eq('id', ex.id); }
      else { await sb.from('assets').insert(rec); }
    }
    // Deactivate assets not in the file (un-reported field-added assets are
    // kept — Freshpet's export can't contain them yet)
    var fileSerials={}; rvRows.forEach(function(x){ fileSerials[x.serial]=1; });
    var deact=assets.filter(function(a){ return !fileSerials[a.serial] && !(a.source==='field' && a.reported===false); }).map(function(a){ return a.id; });
    if(deact.length){ await sb.from('assets').update({ active:false }).in('id', deact); }
    // Drop route assignments for COMPLETED assets; keep pending ones
    var dropIds=assignments.filter(function(a){ var as=assetById(a.asset_id); return as && completedSerials[as.serial]; }).map(function(a){ return a.asset_id; });
    if(dropIds.length){ await sb.from('route_assignments').delete().in('asset_id', dropIds); }
    await loadAll();
    rvRows=null; rvMode=''; rvPMPreview=null; rvBusy=false;
    toast('PM routes reset — new locations loaded, pending assignments kept','ok'); render();
  }catch(e){ rvBusy=false; toast('Reset failed: '+e.message,'err'); render(); }
}

// Approve = SAVE the shown+approved accounts to this quarter's (draft) batch, then
// clear them out of the review list. Under-warranty accounts are saved too
// (billable=false) so they're kept on record for coverage lookups; only
// out-of-warranty accounts count toward billing. Invoicing is a separate step
// (per-batch, below) so completion/saving is independent of billing.
async function saveApprovedToQuarter(){
  if(!rvReview) return;
  var idxs=rvShown().filter(function(i){ return rvReview[i].approved; });
  if(!idxs.length) return toast('No approved rows shown to save (denied rows stay for the removal email)','err');
  var q=(rvQuarter||'').trim();
  if(!q) return toast('Enter a Quarter label first (e.g. 2026 Q3)','err');
  var loc=(rvLocation||'').trim();
  var rate=Number(rvRate)||30;
  // New reactive data ALWAYS purges old: any dataset from a different quarter is
  // replaced when we start saving this one, so the saved set + warranty lookup
  // only ever reflect the current reactive billing data.
  var stale=rvBatches.filter(function(b){ return (b.quarter_label||'')!==q; });
  if(stale.length){
    var staleN=rvSaved.filter(function(a){ return stale.some(function(b){ return b.id===a.batch_id; }); }).length;
    var staleInv=stale.filter(function(b){ return b.status==='invoiced'; }).length;
    if(!confirm('Saving to "'+q+'" will PURGE '+stale.length+' older reactive dataset'+(stale.length===1?'':'s')+' ('+staleN+' saved account'+(staleN===1?'':'s')+(staleInv?', incl. '+staleInv+' already invoiced':'')+') so the new data fully replaces the old.\n\nThe QBO invoices themselves are NOT deleted — only our saved records + portal listings. Continue?')) return;
  }
  rvBusy=true; render();
  try{
    // purge the stale (other-quarter) datasets first
    if(stale.length){
      var staleIds=stale.map(function(b){ return b.id; });
      var dpa=await sb.from('reactive_assets').delete().in('batch_id', staleIds); if(dpa.error) throw new Error(dpa.error.message);
      var dpb=await sb.from('reactive_batches').delete().in('id', staleIds); if(dpb.error) throw new Error(dpb.error.message);
      rvBatches=rvBatches.filter(function(b){ return staleIds.indexOf(b.id)<0; });
      rvSaved=rvSaved.filter(function(a){ return staleIds.indexOf(a.batch_id)<0; });
    }
    // find or create the draft batch for this quarter + location
    var batch=rvBatches.find(function(b){ return b.status==='draft' && (b.quarter_label||'')===q && (b.location||'')===loc; });
    var batchId;
    if(batch){ batchId=batch.id; }
    else {
      var bIns=await sb.from('reactive_batches').insert({ quarter_label:q, location:loc||null, rate:rate, status:'draft', created_by:user.email }).select('id').single();
      if(bIns.error) throw new Error(bIns.error.message);
      batchId=bIns.data.id;
    }
    // dedup by serial against what's already saved in this batch (only for
    // rows that actually have a serial — blank serials are never collapsed)
    var existing={}; rvSaved.forEach(function(a){ if(a.batch_id===batchId && a.serial) existing[a.serial.toUpperCase()]=1; });
    var toSave=idxs.map(function(i){ return rvReview[i]; }).filter(function(x){ return !(x.serial && existing[x.serial.toUpperCase()]); });
    if(toSave.length){
      var rows=toSave.map(function(x){ return { batch_id:batchId, store:x.store, address:x.address, city:x.city, state:x.state, zip:x.zip,
        serial:x.serial, model:x.model, manufacturer:x.manufacturer, under_warranty:!!x.under_warranty, billable:!x.under_warranty, approved:true }; });
      var aIns=await sb.from('reactive_assets').insert(rows); if(aIns.error) throw new Error(aIns.error.message);
    }
    // clear the saved rows out of the review list
    var saveSet={}; idxs.forEach(function(i){ saveSet[i]=1; });
    rvReview=rvReview.filter(function(x,i){ return !saveSet[i]; });
    // refresh saved accounts + batches, then recompute this batch's counts
    await loadAll();
    var mine=rvSaved.filter(function(a){ return a.batch_id===batchId; });
    var bill=mine.filter(function(a){ return a.billable && !a.under_warranty; });
    await sb.from('reactive_batches').update({ asset_count:mine.length, billable_count:bill.length, total:bill.length*rate, rate:rate }).eq('id', batchId);
    var lb=rvBatches.find(function(b){ return b.id===batchId; });
    if(lb){ lb.asset_count=mine.length; lb.billable_count=bill.length; lb.total=bill.length*rate; lb.rate=rate; }
    rvBusy=false;
    var dupes=idxs.length-toSave.length;
    toast(toSave.length+' account'+(toSave.length===1?'':'s')+' saved to '+q+(dupes?(' ('+dupes+' already saved)'):''),'ok');
    render();
  }catch(e){ rvBusy=false; toast('Save failed: '+e.message,'err'); render(); }
}

    var outN=rvReview.filter(function(x){return !x.under_warranty;}).length;
    var underN=rvReview.length-outN;
    h += '<div style="display:flex;align-items:center;gap:14px;margin:12px 0;flex-wrap:wrap"><span class="muted">'+rvReview.length+' still to review · '+appr.length+' approved ('+bill.length+' out-of-warranty) · '+underN+' under warranty</span>'
       + '<div style="margin-left:auto;display:flex;gap:8px"><button class="btn o sm" onclick="composeDenyEmail()">'+icon('mail')+' Email denied to Freshpet</button></div></div>';
    // Filter + bulk approve/deny (speeds up review: e.g. filter Under → Deny all, or Out → Approve all)
    var shown=rvShown();
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
       + '<div class="seg">'
         + '<button class="'+(rvFilter==='all'?'on':'')+'" onclick="setRvFilter(\'all\')">All ('+rvReview.length+')</button>'
         + '<button class="'+(rvFilter==='out'?'on':'')+'" onclick="setRvFilter(\'out\')">'+icon('dollar')+' Out ('+outN+')</button>'
         + '<button class="'+(rvFilter==='under'?'on':'')+'" onclick="setRvFilter(\'under\')">'+icon('shield')+' Under ('+underN+')</button>'
       + '</div>'
       + '<input type="search" placeholder="Search store, city, serial…" value="'+esc(rvSearch)+'" oninput="rvSearch=this.value;render();this.focus()" style="flex:1;min-width:180px">'
       + '<span class="muted" style="font-size:.8rem">'+shown.length+' shown</span>'
       + '<button class="btn o sm" onclick="rvApproveShown(false)">✕ Deny shown</button>'
       + '<button class="btn gn sm" onclick="saveApprovedToQuarter()" '+(rvBusy?'disabled':'')+'>'+(rvBusy?'Saving…':'✓ Approve &amp; save shown')+'</button>'
       + '</div>';
    if(!rvReview.length){ h += '<div class="empty" style="padding:16px;color:var(--gn)">✓ All reviewed accounts saved to '+esc(rvQuarter||'this quarter')+'. Bill the quarter from the Quarterly Reactive table below.</div>'; }
    h += '<div style="overflow-x:auto;max-height:460px;overflow-y:auto"><table><thead><tr><th>Store</th><th class="hide">City</th><th>Serial</th><th>Warranty</th><th>Approve</th></tr></thead><tbody>';
    if(!shown.length){ h += '<tr><td colspan="5" class="empty">'+(rvReview.length?'No rows match.':'Nothing left to review.')+'</td></tr>'; }
    shown.forEach(function(i){ var x=rvReview[i];
      h += '<tr'+(!x.approved?' style="opacity:.5"':'')+'>'
        + '<td>'+esc(x.store||'')+'</td><td class="hide">'+esc(x.city||'')+'</td><td class="mono" style="font-size:.8rem">'+esc(x.serial||'')+'</td>'
        + '<td><button class="btn o sm" onclick="toggleRvWarranty('+i+')" title="Toggle warranty">'+(x.under_warranty?''+icon('shield')+' Under warranty':''+icon('dollar')+' Out of warranty')+'</button></td>'
        + '<td><button class="btn '+(x.approved?'gn':'o')+' sm" onclick="toggleRvApprove('+i+')">'+(x.approved?'✓ Approved':'✕ Denied')+'</button></td></tr>';
    });
    h += '</tbody></table></div></div>';
  }

  if(rvResult){
    var inv=rvResult.invoice||{};
    var pdfUrl=inv.pdfUrl || fpInvoicePdfUrl('Invoice-'+String(inv.ref||'').replace(/[^A-Za-z0-9._-]/g,'_')+'.pdf');
    var portalUrl=inv.portalUrl || fpPortalUrl(inv.ref);
    h += '<div class="card" style="background:var(--sf2);border-color:var(--gn)"><h3 style="color:var(--gn)">✓ '+esc(inv.ref)+' created</h3>'
       + '<div class="muted" style="font-size:.85rem">'+inv.billableCount+' out-of-warranty billed of '+inv.assetCount+' assets · '+money(inv.total)+' · item '+esc(inv.itemUsed)+(rvResult.emailed?' · emailed':'')+(inv.pdfStored?' · PDF stored':'')+'</div>'
       + '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">'
       + (inv.pdfStored?('<a class="btn gn sm" href="'+esc(pdfUrl)+'" target="_blank" rel="noopener">'+icon('file-text')+' View invoice PDF</a>'):'')
       + '<a class="btn o sm" href="'+esc(portalUrl)+'" target="_blank" rel="noopener">'+icon('link')+' Open in portal</a>'
       + (inv.qboInvoiceUrl?('<a class="btn o sm" href="'+esc(inv.qboInvoiceUrl)+'" target="_blank" rel="noopener">'+icon('dollar')+' Open in QuickBooks</a>'):'')
       + '</div>'
       + ((rvResult.warnings&&rvResult.warnings.length)?'<div style="margin-top:8px;color:var(--am);font-size:.82rem">'+icon('alert')+' '+rvResult.warnings.map(esc).join('<br>'+icon('alert')+' ')+'</div>':'')
       + '</div>';
  }

  // Quarterly batches — saved accounts accumulate here; bill each quarter's OOW when ready
  h += '<div class="card"><h3>Quarterly Reactive invoices</h3><div class="hint">Approved accounts save into a draft quarter. Bill the out-of-warranty accounts when the quarter is ready. <strong>Saving a new quarter purges older reactive datasets</strong> — the newest import always replaces the old. Delete ('+icon('trash')+') removes a saved dataset (the QBO invoice, if any, is not touched).</div>';
  if(!rvBatches.length){ h += '<div class="empty" style="padding:16px">None yet.</div>'; }
  else {
    h += '<div style="overflow-x:auto"><table><thead><tr><th>Invoice</th><th>Quarter</th><th>Location</th><th class="num">Saved</th><th class="num">OOW billed</th><th class="num">Total</th><th>Status</th><th></th></tr></thead><tbody>';
    rvBatches.forEach(function(b){
      var savedN=rvSaved.filter(function(a){ return a.batch_id===b.id; }).length;
      h += '<tr><td class="mono">'+esc(b.invoice_ref||'—')+'</td><td>'+esc(b.quarter_label||'')+'</td><td>'+esc(b.location||'')+'</td>'
         + '<td class="num">'+savedN+'</td><td class="num">'+(b.billable_count||0)+'</td><td class="num">'+money(b.total)+'</td>'
         + '<td>'+(b.status==='invoiced'?'<span class="pill gn">Invoiced</span>':'<span class="pill am">Draft</span>')+'</td>'
         + '<td style="white-space:nowrap">'
           + (b.status!=='invoiced'?'<button class="btn gn sm" onclick="invoiceBatch('+b.id+')" '+(rvBusy?'disabled':'')+'>'+icon('receipt')+' Invoice OOW</button> ':'')
           + (b.status==='invoiced'?('<a class="btn o sm" href="'+esc(fpInvoicePdfUrl(b.invoice_pdf_path||('Invoice-'+String(b.invoice_ref||'').replace(/[^A-Za-z0-9._-]/g,"_")+'.pdf')))+'" target="_blank" rel="noopener" title="View invoice PDF">'+icon('file-text')+' Invoice</a> '):'')
           + '<button class="btn o sm" onclick="deleteBatch('+b.id+')" '+(rvBusy?'disabled':'')+' title="Delete this saved dataset" aria-label="Delete this saved dataset">'+icon('trash')+'</button></td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';

  // Saved reactive accounts — warranty coverage lookup (current reactive dataset)
  h += '<div class="card"><h3>Saved accounts · warranty lookup</h3><div class="hint">The current reactive dataset (older quarters are purged when a new one is saved). Search to check whether a store or serial is <strong>under warranty</strong> (kept for coverage, not billed) or <strong>out of warranty</strong> (billed).</div>';
  var byBatch={}; rvBatches.forEach(function(b){ byBatch[b.id]=b; });
  var sq=(rvSavedSearch||'').trim().toLowerCase();
  var savedShown=rvSaved.filter(function(a){
    if(rvSavedFilter==='under' && !a.under_warranty) return false;
    if(rvSavedFilter==='out' && a.under_warranty) return false;
    if(sq && ((a.store||'')+' '+(a.city||'')+' '+(a.serial||'')).toLowerCase().indexOf(sq)<0) return false;
    return true;
  });
  var suN=rvSaved.filter(function(a){ return a.under_warranty; }).length;
  var soN=rvSaved.length-suN;
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
     + '<div class="seg">'
       + '<button class="'+(rvSavedFilter==='all'?'on':'')+'" onclick="rvSavedFilter=\'all\';render()">All ('+rvSaved.length+')</button>'
       + '<button class="'+(rvSavedFilter==='under'?'on':'')+'" onclick="rvSavedFilter=\'under\';render()">'+icon('shield')+' Under ('+suN+')</button>'
       + '<button class="'+(rvSavedFilter==='out'?'on':'')+'" onclick="rvSavedFilter=\'out\';render()">'+icon('dollar')+' Out ('+soN+')</button>'
     + '</div>'
     + '<input type="search" placeholder="Search store, city, serial…" value="'+esc(rvSavedSearch)+'" oninput="rvSavedSearch=this.value;render();this.focus()" style="flex:1;min-width:180px">'
     + '<span class="muted" style="font-size:.8rem">'+savedShown.length+' shown</span>'
     + '</div>';
  if(!rvSaved.length){ h += '<div class="empty" style="padding:16px">No saved accounts yet. Approve accounts in a Quarterly Reactive review to keep them here.</div>'; }
  else {
    h += '<div style="overflow-x:auto;max-height:420px;overflow-y:auto"><table><thead><tr><th>Store</th><th class="hide">City</th><th>Serial</th><th>Quarter</th><th>Warranty</th></tr></thead><tbody>';
    if(!savedShown.length){ h += '<tr><td colspan="5" class="empty">No matches.</td></tr>'; }
    savedShown.slice(0,500).forEach(function(a){ var b=byBatch[a.batch_id]||{};
      h += '<tr><td>'+esc(a.store||'')+'</td><td class="hide">'+esc(a.city||'')+'</td><td class="mono" style="font-size:.8rem">'+esc(a.serial||'')+'</td>'
        + '<td>'+esc(b.quarter_label||'')+'</td>'
        + '<td>'+(a.under_warranty?'<span class="pill">'+icon('shield')+' Under</span>':'<span class="pill am">'+icon('dollar')+' Out</span>')+'</td></tr>';
    });
    if(savedShown.length>500){ h += '<tr><td colspan="5" class="muted" style="text-align:center">Showing first 500 of '+savedShown.length+' — refine your search.</td></tr>'; }
    h += '</tbody></table></div>';
  }
  h += '</div>';
  return h;
}

init();
</script>
</body>
</html>
