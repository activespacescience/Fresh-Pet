<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F172A">
<title>Freshpet · Admin Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Excel (.xls/.xlsx) parsing for the asset uploads. -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- Pre-paint: follow the shared APBG theme (same origin as the gateway). -->
<script>
  (function(){ try { var t = localStorage.getItem('apbg_theme')==='light'?'light':'dark'; document.documentElement.setAttribute('data-apbg-theme', t); } catch(e){} })();
</script>
<!-- APBG cross-app waffle launcher + shared light/dark toggle. -->
<script src="https://alamedapointbg.com/appswitcher.js" defer></script>
<style>
:root{
  --bg:#0F172A; --sf:#171f33; --sf2:#1f2a44; --bd:#2b3a5c; --bd2:#3a4d75;
  --tx:#E2E8F0; --tx2:#9fb0c7; --dim:#6b7b96;
  --ac:#3B82F6; --ac2:#2563EB; --gn:#34D399; --am:#FBBF24; --rd:#F87171;
  --shadow:0 4px 14px rgba(0,0,0,.35);
}
html[data-apbg-theme="light"]{
  --bg:#EEF2F7; --sf:#FFFFFF; --sf2:#F1F5FA; --bd:#D7DEE9; --bd2:#C2CDDC;
  --tx:#0F1B2D; --tx2:#46566e; --dim:#7387a0;
  --ac:#2563EB; --ac2:#1D4ED8; --gn:#1E9E5F; --am:#C9920C; --rd:#E0454A;
  --shadow:0 4px 14px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--ac);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:18px 22px 60px}
/* Header */
.hd{display:flex;align-items:center;gap:14px;padding:14px 0 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.hd .logo{font-size:1.35rem;font-weight:800;letter-spacing:-.02em}
.hd .logo .fp{color:var(--ac)}
.hd .sub{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2)}
.hd .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.who{font-size:.78rem;color:var(--tx2);font-weight:600}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-size:.84rem;font-weight:700;background:var(--ac);color:#fff;transition:filter .15s,background .15s}
.btn:hover{filter:brightness(1.08)}
.btn.o{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.btn.o:hover{border-color:var(--bd2);background:var(--sf)}
.btn.sm{padding:6px 11px;font-size:.78rem;border-radius:8px}
.btn.gn{background:var(--gn)}.btn.rd{background:var(--rd)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Tabs */
.tabs{display:flex;gap:6px;margin:18px 0 16px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:10px;font-size:.86rem;font-weight:700;color:var(--tx2);background:transparent;border:1px solid transparent}
.tab.on{background:var(--sf);color:var(--tx);border-color:var(--bd)}
.tab:hover{color:var(--tx)}
/* Cards / layout */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{font-size:1rem;font-weight:800;margin-bottom:4px}
.card .hint{font-size:.78rem;color:var(--tx2);margin-bottom:14px;line-height:1.5}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
label.f{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin:0 0 5px}
select,input[type=text],input[type=number],input[type=search]{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);font-size:.88rem;outline:none}
select:focus,input:focus{border-color:var(--ac)}
.muted{color:var(--tx2);font-size:.82rem}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--bd)}
.pill.gn{color:var(--gn);border-color:var(--gn);background:rgba(52,211,153,.1)}
.pill.am{color:var(--am);border-color:var(--am);background:rgba(251,191,36,.1)}
.pill.dim{color:var(--tx2)}
/* Route list */
.stop{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--bd);border-radius:12px;background:var(--bg);margin-bottom:8px}
.stop .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem}
.stop .meta{flex:1;min-width:0}
.stop .meta .s{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .meta .a{font-size:.76rem;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .acts{display:flex;gap:4px;flex:none}
.ic{width:30px;height:30px;border-radius:8px;background:var(--sf2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.ic:hover{border-color:var(--bd2)}
.ic:disabled{opacity:.35}
.addrow{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;background:var(--bg)}
.addrow .meta{flex:1;min-width:0}
.addlist{max-height:340px;overflow-y:auto;margin-top:8px;padding-right:4px}
.grp-h{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin:12px 0 6px}
/* Table */
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--bd);font-size:.86rem}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2);font-weight:700}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
tr.tot td{border-top:2px solid var(--bd);font-weight:800;border-bottom:none}
.empty{padding:34px 16px;text-align:center;color:var(--tx2);font-size:.9rem}
/* Overview tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.tile{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:14px 16px}
.tile .lb{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2)}
.tile .v{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums}
.tile .v.gn{color:var(--gn)}.tile .v.am{color:var(--am)}.tile .v.ac{color:var(--ac)}
.tile .sub{font-size:.72rem;color:var(--tx2);margin-top:3px}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.seg button{padding:7px 13px;font-size:.8rem;font-weight:700;color:var(--tx2);background:transparent}
.seg button.on{background:var(--ac);color:#fff}
.bar{height:7px;border-radius:999px;background:var(--sf2);overflow:hidden;min-width:70px}
.bar>i{display:block;height:100%;background:var(--gn);border-radius:999px}
.pill.rd{color:var(--rd);border-color:var(--rd);background:rgba(248,113,113,.1)}
.pill.ac{color:var(--ac);border-color:var(--ac);background:rgba(59,130,246,.1)}
/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login .box{background:var(--sf);border:1px solid var(--bd);border-radius:22px;padding:38px 32px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow)}
.login .box .logo{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.login .box .sub{font-size:.82rem;color:var(--tx2);margin-bottom:24px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:9999;padding:12px 20px;border-radius:12px;font-weight:700;font-size:.86rem;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:90vw}
.toast.ok{background:var(--gn)}.toast.err{background:var(--rd)}.toast.info{background:var(--ac)}
@media(max-width:680px){ .wrap{padding:14px 14px 60px} .hd .sub{display:none} th.hide,td.hide{display:none} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
// Freshpet — Admin Console (back office)
// A second GUI over the SAME Supabase project the handheld field app uses
// (mmkncrsaijexezmhfmiw). One source of truth: routes + payouts edited here
// are the same rows the field app reads, so nothing is mirrored/synced —
// there's only one database. Admin-gated via tech_profiles.role.
// ═══════════════════════════════════════════════════════════════════

var SUPA_URL = 'https://mmkncrsaijexezmhfmiw.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ta25jcnNhaWpleGV6bWhmbWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTkyMjUsImV4cCI6MjA5NjM3NTIyNX0.lx4J-YhlFFrQVJMqjeBXXHNmgZfRe23xYGKZMEL8dPM';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { flowType: 'implicit' } });

// ── shared APBG theme (same-origin localStorage key) ──
function applyTheme(t){ try { document.documentElement.setAttribute('data-apbg-theme', t || (localStorage.getItem('apbg_theme')==='light'?'light':'dark')); } catch(e){} }
window.addEventListener('apbg:themechange', function(e){ applyTheme(e&&e.detail&&e.detail.theme); });
window.addEventListener('storage', function(e){ if(e&&e.key==='apbg_theme') applyTheme(e.newValue); });

// ── state ──
var screen = 'loading';     // loading | login | denied | app
var user = null, profile = null;
var tab = 'overview';        // overview | routes | payments | billing
var ovPeriod = 'all';        // Overview stop-completion window: all | month | prev
var techs = [], assets = [], assignments = [], payouts = [];
var routeTech = '';          // selected tech email in Routes
var routeStops = [];         // working list [{asset_id, asset}] for selected tech
var addSearch = '';
var addSel = {};             // multi-select in the Add-stops list: { asset_id: true }
var payWeek = '';            // selected week_start
var payFrom = null, payTo = null; // Pay report date range (ISO 'YYYY-MM-DD'; '' = unbounded; null = uninitialised → defaults to this month)
var saving = false;

// ── Billing ──
var BILL_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-invoice';
var PAYOUT_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-payout-bill';
var payBusy = false;          // tech-payout bill in flight
var payBillResult = null;     // last payout bill result
var completedPMs = [];        // all completed_pms rows
var billSel = {};             // { id: true } selected for invoicing
var billRate = 30;            // $ per PM (Freshpet default)
var billRecipient = '';       // invoice email recipient
var billSearch = '';
var billShowBilled = true;
var billBusy = false;
var billPreview = null;       // preview result
var billResult = null;        // create result

// ── Reactive / CSV upload ──
var QUARTERLY_FN = 'https://apbg-billing.netlify.app/.netlify/functions/freshpet-quarterly-invoice';
var rvBatches = [];           // existing reactive_batches
var rvFileName = '';
var rvMode = '';              // '' | 'pm' | 'reactive'
var rvRows = null;            // parsed asset records from the CSV
var rvReview = null;          // [{...row, under_warranty, approved}] for reactive
var rvQuarter = '';           // e.g. "2026 Q3"
var rvLocation = '';          // free-text location label
var rvRate = 30;
var rvRecipient = '';
var rvBusy = false;
var rvResult = null;
var rvPMPreview = null;       // {newCount, updateCount, deactivate[], completedDrop}

function esc(s){ var d=document.createElement('div'); d.textContent = s==null?'':s; return d.innerHTML; }
function money(n){ return '$' + Number(n||0).toFixed(2); }
function toast(msg, type){ var t=document.getElementById('toast'); t.innerHTML='<div class="toast '+(type||'info')+'">'+esc(msg)+'</div>'; setTimeout(function(){ t.innerHTML=''; }, 3500); }

// ── auth ──
async function init(){
  applyTheme();
  var { data:{ session } } = await sb.auth.getSession();
  if (session){ user = session.user; await afterLogin(); }
  else { screen='login'; render(); }
  sb.auth.onAuthStateChange(async function(ev, s){
    if (ev==='SIGNED_IN' && s){ if (user && user.id===s.user.id) { user=s.user; return; } user=s.user; await afterLogin(); }
    else if (ev==='SIGNED_OUT'){ user=null; profile=null; screen='login'; render(); }
  });
}
async function afterLogin(){
  var { data } = await sb.from('tech_profiles').select('*').eq('email', user.email).single();
  profile = data || null;
  if (!profile || profile.role !== 'admin'){ screen='denied'; render(); return; }
  await loadAll();
  screen='app'; render();
}
async function signIn(){ var { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href.split('#')[0] } }); if(error) toast('Login failed: '+error.message,'err'); }
async function signOut(){ await sb.auth.signOut(); }

// ── data ──
async function loadAll(){
  var r = await Promise.all([
    sb.from('tech_profiles').select('*').order('role').order('email'),
    sb.from('assets').select('*').eq('active', true).order('city').order('store'),
    sb.from('route_assignments').select('*').eq('active', true).order('stop_order'),
    sb.from('payouts').select('*').order('week_start', { ascending:false }),
    sb.from('completed_pms').select('id,asset_id,store,serial,pm_date,tech_name,tech_user_id,prev_comp,billed,invoice_doc_number,bill_amount,paid_out,payout_amount,payout_bill_ref,paid_out_at').order('pm_date', { ascending:false }),
    sb.from('reactive_batches').select('*').order('created_at', { ascending:false })
  ]);
  techs = r[0].data || []; assets = r[1].data || []; assignments = r[2].data || []; payouts = r[3].data || [];
  completedPMs = r[4].data || [];
  rvBatches = r[5].data || [];
  if (!payWeek && payouts.length) payWeek = payouts[0].week_start;
}
function assetById(id){ return assets.find(function(a){ return a.id===id; }); }
function techName(email){ var t=techs.find(function(x){ return x.email===email; }); return (t&&t.name) || email; }

// ── Routes ──
function selectRouteTech(email){
  routeTech = email; addSearch=''; routeStops=[]; addSel={};
  if (email){
    assignments.filter(function(a){ return a.tech_email===email; })
      .sort(function(a,b){ return (a.stop_order||0)-(b.stop_order||0); })
      .forEach(function(a){ var as=assetById(a.asset_id); if(as) routeStops.push({ asset_id:a.asset_id, asset:as }); });
  }
  render();
}
// A serviced stop is COMPLETED and locked — it can't be moved or removed.
function stopCompleted(id){ return completedPMs.some(function(p){ return !p.prev_comp && p.asset_id===id; }); }
function moveStop(i, dir){ var j=i+dir; if(j<0||j>=routeStops.length) return; if(stopCompleted(routeStops[i].asset_id)||stopCompleted(routeStops[j].asset_id)){ toast('Completed stops are locked','info'); return; } var t=routeStops[i]; routeStops[i]=routeStops[j]; routeStops[j]=t; render(); }
function removeStop(i){ if(stopCompleted(routeStops[i].asset_id)){ toast('Completed stops are locked — can\'t remove','info'); return; } routeStops.splice(i,1); render(); }
function addStop(id){ if(routeStops.some(function(s){return s.asset_id===id;})) return; if(assetLockedElsewhere(id)){ toast('That store is on another tech\'s route','err'); return; } var as=assetById(id); if(as){ routeStops.push({asset_id:id, asset:as}); render(); } }
// An asset is claimable by the current tech only if no OTHER tech holds it.
function assetLockedElsewhere(id){
  var owner = assignments.find(function(x){ return x.asset_id===id; });
  return owner && owner.tech_email !== routeTech;
}
function toggleAddSel(id){
  if(assetLockedElsewhere(id)){ toast('That store is on another tech\'s route','err'); return; }
  if(addSel[id]) delete addSel[id]; else addSel[id]=true; render();
}
function toggleAddSelAll(){
  var q = addSearch.trim().toLowerCase();
  var avail = assets.filter(function(a){
    if(routeStops.some(function(s){return s.asset_id===a.id;})) return false;
    if(assetLockedElsewhere(a.id)) return false;   // locked to another tech
    if(!q) return true;
    return ((a.store||'')+' '+(a.city||'')+' '+(a.address||'')+' '+(a.serial||'')).toLowerCase().indexOf(q)>=0;
  });
  var allSel = avail.length>0 && avail.every(function(a){ return addSel[a.id]; });
  avail.forEach(function(a){ if(allSel) delete addSel[a.id]; else addSel[a.id]=true; });
  render();
}
function addSelectedStops(){
  var ids = Object.keys(addSel).filter(function(k){ return addSel[k]; }).map(Number);
  var added = 0, skipped = 0;
  ids.forEach(function(id){
    if(routeStops.some(function(s){return s.asset_id===id;})) return;   // already in list
    if(assetLockedElsewhere(id)){ skipped++; return; }                  // another tech owns it
    var as=assetById(id); if(as){ routeStops.push({asset_id:id, asset:as}); added++; }
  });
  addSel = {};
  toast(added+' stop(s) added'+(skipped?', '+skipped+' skipped (on another tech)':'')+' — Save route to apply', skipped?'info':'ok');
  render();
}
async function saveRoute(){
  if(!routeTech) return;
  // Defensive: drop any stop that a DIFFERENT tech already owns (a store is
  // one-tech-only; the DB enforces this too, but fail clearly, not on insert).
  var conflicts = routeStops.filter(function(s){ return assetLockedElsewhere(s.asset_id); });
  if(conflicts.length){
    routeStops = routeStops.filter(function(s){ return !assetLockedElsewhere(s.asset_id); });
    toast(conflicts.length+' store(s) removed — already on another tech\'s route','err');
    render();
    return;
  }
  // Guard against duplicate asset_ids in the working list.
  var seen = {}; routeStops = routeStops.filter(function(s){ if(seen[s.asset_id]) return false; seen[s.asset_id]=true; return true; });
  saving=true; render();
  // Rebuild the tech's route as one ordered set (same pattern the field app uses).
  var del = await sb.from('route_assignments').delete().eq('tech_email', routeTech);
  if(del.error){ saving=false; render(); return toast('Save failed: '+del.error.message,'err'); }
  if(routeStops.length){
    var rows = routeStops.map(function(s, i){ return { tech_email:routeTech, asset_id:s.asset_id, stop_order:i, route_name:'Primary Route', active:true }; });
    var ins = await sb.from('route_assignments').insert(rows);
    if(ins.error){ saving=false; render(); return toast(ins.error.code==='23505'?'Save failed: a store is already on another tech\'s route':'Save failed: '+ins.error.message,'err'); }
  }
  await loadAll(); saving=false; toast('Route saved for '+techName(routeTech),'ok'); render();
}

// ── Payments ──
function setPayWeek(w){ payWeek=w; render(); }
async function markPaid(id){
  if(!confirm('Mark this payout PAID?')) return;
  var { error } = await sb.from('payouts').update({ status:'paid' }).eq('id', id);
  if(error) return toast('Failed: '+error.message,'err');
  await loadAll(); toast('Marked paid','ok'); render();
}
async function saveRate(email, val){
  var rate = val===''? null : Number(val);
  if(val!=='' && (isNaN(rate)||rate<0)) return toast('Invalid rate','err');
  var { error } = await sb.from('tech_profiles').update({ pm_rate: rate }).eq('email', email);
  if(error) return toast('Failed: '+error.message,'err');
  await loadAll(); toast('Rate saved for '+techName(email),'ok'); render();
}

// ═══ render ═══
function render(){
  var app = document.getElementById('app');
  if (screen==='loading'){ app.innerHTML='<div class="empty" style="margin-top:80px">Loading…</div>'; return; }
  if (screen==='login'){
    app.innerHTML='<div class="login"><div class="box"><div class="logo">🐾 <span style="color:var(--ac)">Freshpet</span> Admin</div><div class="sub">Back-office console — routes &amp; payments</div><button class="btn" style="width:100%;justify-content:center" onclick="signIn()">Sign in with Google</button></div></div>';
    return;
  }
  if (screen==='denied'){
    app.innerHTML='<div class="login"><div class="box"><div class="logo">🔒 Admin only</div><div class="sub">'+esc(user?user.email:'')+' isn\'t an admin on Freshpet. Ask a super-admin to set your role, then reload.</div><button class="btn o" style="width:100%;justify-content:center" onclick="signOut()">Sign out</button></div></div>';
    return;
  }
  var h = '<div class="wrap">';
  h += '<div class="hd"><div><div class="logo">🐾 <span class="fp">Freshpet</span> Admin</div></div><div class="sub">Back office</div>'
     + '<div class="right"><span class="who">'+esc(profile.name||user.email)+'</span><a class="btn o sm" href="./portal" target="_blank" title="Open the Freshpet customer portal (view as they see it)">👁 Freshpet portal</a><a class="btn o sm" href="./">📱 Field app</a><button class="btn o sm" onclick="signOut()">Sign out</button></div></div>';
  h += '<div class="tabs">'
     + '<button class="tab '+(tab==='overview'?'on':'')+'" onclick="tab=\'overview\';render()">📊 Overview</button>'
     + '<button class="tab '+(tab==='routes'?'on':'')+'" onclick="tab=\'routes\';render()">🗺️ Routes</button>'
     + '<button class="tab '+(tab==='payments'?'on':'')+'" onclick="tab=\'payments\';render()">💰 Payments</button>'
     + '<button class="tab '+(tab==='billing'?'on':'')+'" onclick="tab=\'billing\';render()">🧾 Freshpet Billing</button>'
     + '<button class="tab '+(tab==='reactive'?'on':'')+'" onclick="tab=\'reactive\';render()">📥 Upload / Reactive</button>'
     + '</div>';
  h += tab==='overview' ? renderOverview()
     : tab==='routes' ? renderRoutes()
     : tab==='payments' ? renderPayments()
     : tab==='reactive' ? renderReactive()
     : renderBilling();
  h += '</div>';
  app.innerHTML = h;
}

// ═══ Overview (company-wide + per-contractor) ═══
// Stops: "completed" / "remaining" are scoped to the selected period. Pay:
// "paid out" / "owed" are cumulative — they reflect the full completed_pms
// ledger, not a single period. Everything is attributed to the ROUTE OWNER of
// each asset (not the login that recorded the PM): some contractors (e.g. Bill
// Pace) have no field login of their own, so their stops are logged under
// another account — but the work, completion and pay are still theirs.
// Techs are paid a flat rate per completed PM; when a paid row has no stored
// payout_amount and the tech has no per-PM rate, fall back to DEFAULT_PM_RATE.
var DEFAULT_PM_RATE = 30;
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function isoDate(d){ var p=function(n){ return (n<10?'0':'')+n; }; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function fmtDate(iso){ if(!iso) return ''; var p=String(iso).slice(0,10).split('-'); return MONTHS[(+p[1])-1]+' '+(+p[2]); }
function periodBoundsOf(which){
  if(which==='all') return { start:null, end:null, label:'All time' };
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(which==='prev'){ m-=1; if(m<0){ m=11; y-=1; } }
  var start=new Date(y,m,1), end=new Date(y,m+1,0);
  return { start:isoDate(start), end:isoDate(end), label:MONTHS[m]+' '+y };
}
function periodBounds(){ return periodBoundsOf(ovPeriod); }
function inPeriod(dateStr, b){ if(!b.start) return true; if(!dateStr) return false; var d=String(dateStr).slice(0,10); return d>=b.start && d<=b.end; }

function computeOverview(){
  var b = periodBounds();
  var rateByEmail={}, hasLoginByEmail={};
  techs.forEach(function(t){ rateByEmail[t.email]=t.pm_rate!=null?Number(t.pm_rate):null; hasLoginByEmail[t.email]=!!t.user_id; });
  var rateFor=function(email){ return (email && rateByEmail[email]!=null) ? rateByEmail[email] : DEFAULT_PM_RATE; };
  // owner (active route) of each asset — the attribution key for everything below
  var ownerOf={}; assignments.forEach(function(a){ ownerOf[a.asset_id]=a.tech_email; });
  // assets serviced within the period (exclude PREV COMP — done elsewhere)
  var doneInPeriod={};
  completedPMs.forEach(function(p){ if(p.prev_comp) return; if(!inPeriod(p.pm_date,b)) return; if(p.asset_id!=null) doneInPeriod[p.asset_id]=true; });

  var rows={};
  function bucket(email){ return rows[email]||(rows[email]={email:email, assigned:0, completed:0, paidOut:0, paidPMs:0, unpaid:0, rate:rateByEmail[email]!=null?rateByEmail[email]:null}); }
  // stops: attribute to the route owner so remaining = assigned − completed is always coherent
  assignments.forEach(function(a){ var t=bucket(a.tech_email); t.assigned++; if(doneInPeriod[a.asset_id]) t.completed++; });

  // pay & owed: attribute each completed PM to its asset's ROUTE OWNER (not the
  // login that recorded it). Paid value = stored payout_amount, else the tech's
  // rate, else DEFAULT_PM_RATE. Cumulative (not period-scoped).
  var offRoutePaid=0, offRouteUnpaid=0;
  completedPMs.forEach(function(p){
    if(p.prev_comp) return;
    var owner = p.asset_id!=null ? ownerOf[p.asset_id] : null;
    var val = p.payout_amount!=null ? Number(p.payout_amount) : rateFor(owner);
    if(p.paid_out){
      if(owner){ var t=bucket(owner); t.paidOut+=val; t.paidPMs++; }
      else offRoutePaid+=val;
    } else {
      if(owner) bucket(owner).unpaid++;
      else offRouteUnpaid++;
    }
  });

  var list=Object.keys(rows).map(function(e){
    var r=rows[e]; r.name=techName(e); r.remaining=Math.max(0,r.assigned-r.completed);
    r.owed = r.unpaid * (r.rate!=null?r.rate:DEFAULT_PM_RATE);
    r.noLogin = hasLoginByEmail[e]===false && r.assigned>0; // owns a route but has no field login (PMs logged elsewhere)
    return r;
  }).sort(function(a,b){ return b.assigned-a.assigned || (b.paidOut-a.paidOut); });

  // company totals (assigned/completed/remaining = route stops; pay incl. off-route)
  var assignedAssets=Object.keys(ownerOf).length;
  var completedAssigned=0; Object.keys(ownerOf).forEach(function(id){ if(doneInPeriod[id]) completedAssigned++; });
  var offRoute=0; Object.keys(doneInPeriod).forEach(function(id){ if(!ownerOf[id]) offRoute++; });
  var contribPaid=0, contribOwed=0, contribUnpaid=0;
  list.forEach(function(r){ contribPaid+=r.paidOut; contribOwed+=r.owed; contribUnpaid+=r.unpaid; });

  return { b:b, list:list, offRoutePaid:offRoutePaid, offRouteUnpaid:offRouteUnpaid, contribPaid:contribPaid, contribOwed:contribOwed, company:{
    assigned:assignedAssets, completed:completedAssigned, remaining:Math.max(0,assignedAssets-completedAssigned),
    offRoute:offRoute,
    paidOut:contribPaid+offRoutePaid,
    owed:contribOwed+offRouteUnpaid*DEFAULT_PM_RATE,
    unpaid:contribUnpaid+offRouteUnpaid,
    activeAssets:assets.length, unassigned:Math.max(0,assets.length-assignedAssets)
  }};
}

async function createPayoutBill(techUserId){
  var t = techs.find(function(x){ return x.user_id===techUserId; });
  if(!t) return;
  var unpaid = completedPMs.filter(function(p){ return !p.prev_comp && !p.paid_out && p.tech_user_id===techUserId; });
  var rate = t.pm_rate!=null ? Number(t.pm_rate) : null;
  if(rate==null || rate<=0) return toast('Set a per-PM rate for '+(t.name||t.email)+' first (below)','err');
  if(!unpaid.length) return toast('No unpaid PMs for this tech','err');
  if(!confirm('Create a QuickBooks BILL to '+(t.name||t.email)+' for '+unpaid.length+' PM'+(unpaid.length===1?'':'s')+' @ '+money(rate)+' = '+money(unpaid.length*rate)+'?\n\nThis posts a real vendor bill in QBO and marks these PMs paid out.')) return;
  payBusy=true; payBillResult=null; render();
  try{
    var token = await billToken();
    var res = await fetch(PAYOUT_FN, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ mode:'create', techUserId:techUserId, rate:rate }) });
    var j = await res.json();
    if(!res.ok) throw new Error(j.error || ('HTTP '+res.status));
    payBillResult = j;
    await loadAll();
    toast('Bill #'+(j.bill&&j.bill.docNumber)+' created for '+(j.bill&&j.bill.vendor),'ok');
  }catch(e){ toast('Failed: '+e.message,'err'); }
  payBusy=false; render();
}

// ── Pay report (date range, by contractor) ──
function setPayFrom(v){ payFrom=v; render(); }
function setPayTo(v){ payTo=v; render(); }
function payPreset(which){
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  if(which==='this'){ payFrom=isoDate(new Date(y,m,1)); payTo=isoDate(new Date(y,m+1,0)); }
  else if(which==='last'){ payFrom=isoDate(new Date(y,m-1,1)); payTo=isoDate(new Date(y,m,0)); }
  else { payFrom=''; payTo=''; } // all time
  render();
}
function payInRange(dateStr){ var d=String(dateStr||'').slice(0,10); if(payFrom && d<payFrom) return false; if(payTo && d>payTo) return false; return true; }
function renderPayReport(){
  // Lazy default → current month (so history is one click away via presets).
  if(payFrom===null){ var n=new Date(); payFrom=isoDate(new Date(n.getFullYear(),n.getMonth(),1)); payTo=isoDate(new Date(n.getFullYear(),n.getMonth()+1,0)); }
  var rateByEmail={}; techs.forEach(function(t){ rateByEmail[t.email]=t.pm_rate!=null?Number(t.pm_rate):null; });
  var rateFor=function(e){ return (e && rateByEmail[e]!=null) ? rateByEmail[e] : DEFAULT_PM_RATE; };
  var ownerOf={}; assignments.forEach(function(a){ ownerOf[a.asset_id]=a.tech_email; });
  var rows={}; function bk(e){ return rows[e]||(rows[e]={email:e, pms:0, paidPMs:0, unpaidPMs:0, paid:0, owed:0}); }
  var off={email:'(off-route)', pms:0, paidPMs:0, unpaidPMs:0, paid:0, owed:0};
  completedPMs.forEach(function(p){
    if(p.prev_comp) return; if(!payInRange(p.pm_date)) return;
    var owner = p.asset_id!=null ? ownerOf[p.asset_id] : null;
    var rate = rateFor(owner);

// ═══ Reactive / CSV upload ═══
function parseCSV(text){
  var rows=[], row=[], cur='', inQ=false;
  for(var i=0;i<text.length;i++){ var c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else { inQ=false; } } else { cur+=c; } }
    else if(c==='"'){ inQ=true; }
    else if(c===','){ row.push(cur); cur=''; }
    else if(c==='\n'){ row.push(cur); cur=''; if(row.some(function(x){return x.trim()!=='';})) rows.push(row); row=[]; }
    else if(c!=='\r'){ cur+=c; }
  }
  row.push(cur); if(row.some(function(x){return x.trim()!=='';})) rows.push(row);
  return rows;
}
var CSV_COLMAP = {
  store:['account name','store','store name'],
  address:['shipping address line 1','address','shipping street'],
  city:['city'], state:['shipping state/province','state','state/province'],
  zip:['shipping zip/postal code','zip','zip/postal code','zip code','postal code'],
  phone:['phone'], manufacturer:['manufacturer'], model:['model'],
  serial:['asset: serial number','serial number','serial'], warranty:['warranty']
};
function mapCSVHeader(headerRow){
  var idx={}; headerRow.forEach(function(cell,i){ var n=cell.trim().toLowerCase().replace(/^location:\s*/,'');
    for(var f in CSV_COLMAP){ if(idx[f]===undefined && CSV_COLMAP[f].indexOf(n)>-1) idx[f]=i; } });
  return idx;
}
// Heuristic: warranty column empty / says out/expired/no → out of warranty (billable).
// A future-dated warranty (or explicit yes/active) → under warranty. Admin can flip per row.
function isOutOfWarranty(w){
  var s=(w||'').trim().toLowerCase();
  if(!s) return true;
  if(/(out|expired|none|no\b|n\/a|na)/.test(s)) return true;
  if(/(active|yes|in warranty|under|covered)/.test(s)) return false;
  var d=Date.parse(s); if(!isNaN(d)) return d < Date.now();   // past date = expired
  return true;
}
// Turn a raw grid (array of arrays; row 0 = headers) into asset records.
function rowsToAssetRecords(raw){
  if(!raw || raw.length<2){ toast('File appears empty','err'); return null; }
  var idx=mapCSVHeader(raw[0].map(function(c){ return c==null?'':String(c); }));
  var need=['store','city','serial']; var miss=need.filter(function(f){ return idx[f]===undefined; });
  if(miss.length){ toast('File missing columns: '+miss.join(', '),'err'); return null; }
  var out=[];
  for(var i=1;i<raw.length;i++){ var r=raw[i]||[];
    var g=function(f){ var v=idx[f]!==undefined ? r[idx[f]] : ''; return v==null?'':String(v).trim(); };
    var serial=g('serial'); if(!serial) continue;
    out.push({ store:g('store'), address:g('address'), city:g('city'), state:g('state')||'CA', zip:g('zip'),
      phone:g('phone'), manufacturer:g('manufacturer'), model:g('model'), serial:serial, warranty:g('warranty') });
  }
  return out;
}
function onReactiveCSV(input){
  var file=input.files&&input.files[0]; if(!file) return;
  rvFileName=file.name; rvMode=''; rvRows=null; rvReview=null; rvPMPreview=null; rvResult=null;
  var isXls=/\.xlsx?$/i.test(file.name);
  if(isXls && typeof XLSX==='undefined'){ toast('Excel reader not loaded — try a CSV, or reload','err'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var raw;
    try{
      if(isXls){
        var wb=XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        var ws=wb.Sheets[wb.SheetNames[0]];
        raw=XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false, defval:'' });
      } else {
        raw=parseCSV(e.target.result);
      }
    }catch(err){ toast('Could not read file: '+err.message,'err'); return; }
    var out=rowsToAssetRecords(raw); if(!out) return;
    rvRows=out; render();
  };
  if(isXls) reader.readAsArrayBuffer(file); else reader.readAsText(file);
}
function pickMode(m){ rvMode=m; rvResult=null;
  if(m==='reactive'){ rvReview = rvRows.map(function(x){ var oow=isOutOfWarranty(x.warranty); return Object.assign({}, x, { under_warranty:!oow, approved:true }); }); }
  if(m==='pm'){ buildPMPreview(); }
  render();
}
function toggleRvApprove(i){ rvReview[i].approved=!rvReview[i].approved; render(); }
function toggleRvWarranty(i){ rvReview[i].under_warranty=!rvReview[i].under_warranty; render(); }

// ── PM reset ──
function buildPMPreview(){
  var bySerial={}; assets.forEach(function(a){ bySerial[a.serial]=a; });
  var fileSerials={}; rvRows.forEach(function(x){ fileSerials[x.serial]=1; });
  var completedSerials={}; completedPMs.forEach(function(p){ completedSerials[p.serial]=1; });
  var newCount=0, updateCount=0;
  rvRows.forEach(function(x){ if(bySerial[x.serial]) updateCount++; else newCount++; });
  var deactivate=assets.filter(function(a){ return !fileSerials[a.serial]; });
  // assignments dropped = those whose asset is completed; kept = uncompleted
  var completedAssignments = assignments.filter(function(a){ var as=assetById(a.asset_id); return as && completedSerials[as.serial]; });
  rvPMPreview={ newCount:newCount, updateCount:updateCount, deactivate:deactivate, dropAssign:completedAssignments.length, keepAssign:assignments.length-completedAssignments.length };
  render();
}
async function applyPMReset(){
  if(!rvRows) return;
  var p=rvPMPreview||{};
  if(!confirm('This resets the PM routes loaded as of '+new Date().toLocaleDateString()+'.\n\n• '+p.newCount+' new locations added (unassigned)\n• '+p.updateCount+' existing updated\n• '+(p.deactivate?p.deactivate.length:0)+' removed (deactivated)\n• '+p.dropAssign+' completed stops unassigned; '+p.keepAssign+' pending assignments kept\n\nAll completed PM history is preserved. Continue?')) return;
  rvBusy=true; render();
  try{
    // Upsert assets by serial
    var bySerial={}; assets.forEach(function(a){ bySerial[a.serial]=a; });
    var completedSerials={}; completedPMs.forEach(function(x){ completedSerials[x.serial]=1; });
    for(var i=0;i<rvRows.length;i++){ var x=rvRows[i]; var ex=bySerial[x.serial];
      var rec={ store:x.store, address:x.address, city:x.city, state:x.state, zip:x.zip, phone:x.phone,
        manufacturer:x.manufacturer, model:x.model, serial:x.serial, warranty:x.warranty, active:true };
      if(ex){ await sb.from('assets').update(rec).eq('id', ex.id); }
      else { await sb.from('assets').insert(rec); }
    }
    // Deactivate assets not in the file
    var fileSerials={}; rvRows.forEach(function(x){ fileSerials[x.serial]=1; });
    var deact=assets.filter(function(a){ return !fileSerials[a.serial]; }).map(function(a){ return a.id; });
    if(deact.length){ await sb.from('assets').update({ active:false }).in('id', deact); }
    // Drop route assignments for COMPLETED assets; keep pending ones
    var dropIds=assignments.filter(function(a){ var as=assetById(a.asset_id); return as && completedSerials[as.serial]; }).map(function(a){ return a.asset_id; });
    if(dropIds.length){ await sb.from('route_assignments').delete().in('asset_id', dropIds); }
    await loadAll();
    rvRows=null; rvMode=''; rvPMPreview=null; rvBusy=false;
    toast('PM routes reset — new locations loaded, pending assignments kept','ok'); render();
  }catch(e){ rvBusy=false; toast('Reset failed: '+e.message,'err'); render(); }
}

// ── Reactive quarterly ──
function composeDenyEmail(){
  var denied=(rvReview||[]).filter(function(x){ return !x.approved; });
  if(!denied.length){ toast('No denied accounts to report','info'); return; }
  var body='Please remove the following accounts from the Freshpet quarterly reactive list'+(rvQuarter?' ('+rvQuarter+')':'')+':\n\n'
    + denied.map(function(x){ return '• '+x.store+' — '+(x.city||'')+' — S/N '+x.serial; }).join('\n')
    + '\n\nThank you.';
  window.location.href='mailto:?subject='+encodeURIComponent('Freshpet reactive list — accounts to remove'+(rvQuarter?' ('+rvQuarter+')':''))+'&body='+encodeURIComponent(body);
}
async function createReactiveInvoice(){
  var approved=(rvReview||[]).filter(function(x){ return x.approved; });
  if(!approved.length) return toast('No approved assets to invoice','err');
  var billable=approved.filter(function(x){ return !x.under_warranty; });
  var rate=Number(rvRate)||30;
  if(!confirm('Create a Quarterly Reactive invoice?\n\n'+approved.length+' assets imported ('+billable.length+' out-of-warranty billed @ '+money(rate)+' = '+money(billable.length*rate)+').\nDenied: '+((rvReview.length)-approved.length)+'.\n\nThis posts a real QBO invoice (FP-QRB) and adds it to the portal.')) return;
  rvBusy=true; rvResult=null; render();
  try{
    var token=(await sb.auth.getSession()).data.session.access_token;
    // 1) allocate FP-QRB ref
    var refRes=await sb.rpc('fp_next_qrb_ref'); if(refRes.error) throw new Error(refRes.error.message);
    var ref=refRes.data;
    // 2) create batch
    var bIns=await sb.from('reactive_batches').insert({ invoice_ref:ref, quarter_label:rvQuarter||null, location:rvLocation||null,
      rate:rate, asset_count:approved.length, billable_count:billable.length, total:billable.length*rate, status:'draft', created_by:user.email }).select('id').single();
    if(bIns.error) throw new Error(bIns.error.message);
    var batchId=bIns.data.id;
    // 3) insert approved assets
    var rows=approved.map(function(x){ return { batch_id:batchId, store:x.store, address:x.address, city:x.city, state:x.state, zip:x.zip,
      serial:x.serial, model:x.model, manufacturer:x.manufacturer, under_warranty:!!x.under_warranty, billable:!x.under_warranty, approved:true }; });
    var aIns=await sb.from('reactive_assets').insert(rows); if(aIns.error) throw new Error(aIns.error.message);
    // 4) create the QBO invoice + PDF via the backend
    var res=await fetch(QUARTERLY_FN,{ method:'POST', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token },
      body:JSON.stringify({ mode:'create', batchId:batchId, rate:rate, recipientEmail:(rvRecipient||'').trim() }) });
    var j=await res.json(); if(!res.ok) throw new Error(j.error||('HTTP '+res.status));
    rvResult=j; rvRows=null; rvMode=''; rvReview=null;
    await loadAll();
    toast('Invoice '+(j.invoice&&j.invoice.ref)+' created','ok');
  }catch(e){ toast('Failed: '+e.message,'err'); }
  rvBusy=false; render();
}

function renderReactive(){
  var h='<div class="card"><h3>Upload asset spreadsheet</h3><div class="hint">Upload the Freshpet asset list as <strong>CSV or Excel (.xls/.xlsx)</strong>, then choose what to do with it. Matched by serial. Same file works for a PM route reset or a Quarterly Reactive invoice.</div>';
  h += '<input type="file" accept=".csv,.xls,.xlsx,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" onchange="onReactiveCSV(this)" style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--tx)">';
  if(rvRows){
    h += '<div class="muted" style="margin-top:10px">📄 '+esc(rvFileName)+' — '+rvRows.length+' assets parsed.</div>';
    h += '<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">'
       + '<button class="btn '+(rvMode==='pm'?'':'o')+'" onclick="pickMode(\'pm\')">🗺️ Update PM routes</button>'
       + '<button class="btn '+(rvMode==='reactive'?'':'o')+'" onclick="pickMode(\'reactive\')">🧾 Create Quarterly Reactive Invoice</button>'
       + '</div>';
  }
  h += '</div>';

  // PM reset
  if(rvMode==='pm' && rvPMPreview){
    var p=rvPMPreview;
    h += '<div class="card"><h3>Update PM routes</h3><div class="hint">Reloads locations from the file. Completed PM history is kept. Completed stops are unassigned; <strong>pending (uncompleted) assignments are kept</strong>; new locations come in unassigned and need routing.</div>';
    h += '<div style="line-height:2">➕ <strong>'+p.newCount+'</strong> new locations · 🔄 <strong>'+p.updateCount+'</strong> updated · 🗑️ <strong>'+p.deactivate.length+'</strong> removed<br>'
       + '🧹 <strong>'+p.dropAssign+'</strong> completed stops unassigned · ✅ <strong>'+p.keepAssign+'</strong> pending assignments kept</div>';
    h += '<button class="btn rd" style="margin-top:12px" onclick="applyPMReset()" '+(rvBusy?'disabled':'')+'>'+(rvBusy?'Working…':'⚠ Reset PM routes')+'</button>';
    h += '</div>';
  }

  // Reactive review
  if(rvMode==='reactive' && rvReview){
    var appr=rvReview.filter(function(x){return x.approved;}); var bill=appr.filter(function(x){return !x.under_warranty;});
    var rate=Number(rvRate)||30;
    h += '<div class="card"><h3>Quarterly Reactive — review</h3><div class="hint">Approve/deny each account. Denied accounts can be emailed back to Freshpet to remove. Approved accounts import; only <strong>out-of-warranty</strong> ones are billed @ rate. All approved appear on the invoice report; billing counts OOW only.</div>';
    h += '<div class="row" style="align-items:flex-end">'
       + '<div style="flex:none"><label class="f">Quarter</label><input type="text" placeholder="2026 Q3" value="'+esc(rvQuarter)+'" oninput="rvQuarter=this.value" style="max-width:140px"></div>'
       + '<div class="col" style="max-width:240px"><label class="f">Location label</label><input type="text" placeholder="NorCal" value="'+esc(rvLocation)+'" oninput="rvLocation=this.value"></div>'
       + '<div style="flex:none"><label class="f">Rate / cooler</label><input type="number" step="0.01" min="0" value="'+rate+'" oninput="rvRate=this.value" style="max-width:110px;text-align:right"></div>'
       + '<div class="col" style="max-width:260px"><label class="f">Invoice email (optional)</label><input type="text" placeholder="billing@freshpet.com" value="'+esc(rvRecipient)+'" oninput="rvRecipient=this.value"></div>'
       + '</div>';
    h += '<div style="display:flex;align-items:center;gap:14px;margin:12px 0;flex-wrap:wrap"><span class="muted">'+appr.length+' approved · '+bill.length+' out-of-warranty (billed) · '+money(bill.length*rate)+'</span>'
       + '<div style="margin-left:auto;display:flex;gap:8px"><button class="btn o sm" onclick="composeDenyEmail()">✉ Email denied to Freshpet</button>'
       + '<button class="btn gn sm" onclick="createReactiveInvoice()" '+(rvBusy?'disabled':'')+'>'+(rvBusy?'Working…':'🧾 Create FP-QRB invoice')+'</button></div></div>';
    h += '<div style="overflow-x:auto;max-height:460px;overflow-y:auto"><table><thead><tr><th>Store</th><th class="hide">City</th><th>Serial</th><th>Warranty</th><th>Approve</th></tr></thead><tbody>';
    rvReview.forEach(function(x,i){
      h += '<tr'+(!x.approved?' style="opacity:.5"':'')+'>'
        + '<td>'+esc(x.store||'')+'</td><td class="hide">'+esc(x.city||'')+'</td><td class="mono" style="font-size:.8rem">'+esc(x.serial||'')+'</td>'
        + '<td><button class="btn o sm" onclick="toggleRvWarranty('+i+')" title="Toggle warranty">'+(x.under_warranty?'🛡 Under warranty':'💲 Out of warranty')+'</button></td>'
        + '<td><button class="btn '+(x.approved?'gn':'o')+' sm" onclick="toggleRvApprove('+i+')">'+(x.approved?'✓ Approved':'✕ Denied')+'</button></td></tr>';
    });
    h += '</tbody></table></div></div>';
  }

  if(rvResult){
    var inv=rvResult.invoice||{};
    h += '<div class="card" style="background:var(--sf2);border-color:var(--gn)"><h3 style="color:var(--gn)">✓ '+esc(inv.ref)+' created</h3>'
       + '<div class="muted" style="font-size:.85rem">'+inv.billableCount+' out-of-warranty billed of '+inv.assetCount+' assets · '+money(inv.total)+' · item '+esc(inv.itemUsed)+(rvResult.emailed?' · emailed':'')+(inv.pdfStored?' · PDF stored':'')+'</div>'
       + ((rvResult.warnings&&rvResult.warnings.length)?'<div style="margin-top:8px;color:var(--am);font-size:.82rem">⚠ '+rvResult.warnings.map(esc).join('<br>⚠ ')+'</div>':'')
       + '</div>';
  }

  // Existing reactive batches
  h += '<div class="card"><h3>Quarterly Reactive invoices</h3>';
  if(!rvBatches.length){ h += '<div class="empty" style="padding:16px">None yet.</div>'; }
  else {
    h += '<div style="overflow-x:auto"><table><thead><tr><th>Invoice</th><th>Quarter</th><th>Location</th><th class="num">OOW billed</th><th class="num">Total</th><th>Status</th></tr></thead><tbody>';
    rvBatches.forEach(function(b){
      h += '<tr><td class="mono">'+esc(b.invoice_ref)+'</td><td>'+esc(b.quarter_label||'')+'</td><td>'+esc(b.location||'')+'</td>'
         + '<td class="num">'+(b.billable_count||0)+'</td><td class="num">'+money(b.total)+'</td>'
         + '<td>'+(b.status==='invoiced'?'<span class="pill gn">Invoiced</span>':'<span class="pill am">Draft</span>')+'</td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';
  return h;
}

init();
</script>
